<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>工作台 - 平台管理系统</title>
  <style>
    :root {
      --primary: #1677ff;
      --bg: #f5f7fb;
      --card: #fff;
      --border: rgba(5,5,5,.10);
      --text: rgba(0,0,0,.88);
      --text2: rgba(0,0,0,.65);
      --radius: 10px;
      --shadow: 0 6px 20px rgba(0,0,0,.06);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .app-shell { min-height: 100vh; display: flex; flex-direction: column; }
    .app-header { height: 64px; background: var(--card); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 24px; gap: 48px; }
    .app-logo { font-size: 18px; font-weight: 600; color: var(--primary); white-space: nowrap; }
    .top-nav-container { display: flex; gap: 4px; flex: 1; }
    .top-nav-item { padding: 8px 16px; text-decoration: none; color: var(--text); border-radius: 6px; font-size: 14px; transition: background .2s, color .2s; position: relative; }
    .top-nav-item:hover { background: rgba(22, 119, 255, .08); color: var(--primary); }
    .top-nav-item.is-active { color: var(--primary); font-weight: 500; background: #e6f4ff; }
    .top-nav-item.is-active::after { content: ''; position: absolute; bottom: 0; left: 16px; right: 16px; height: 2px; background: var(--primary); border-radius: 1px; }
    .app-body { flex: 1; display: flex; min-height: 0; }
    .app-sider { width: 220px; background: var(--card); border-right: 1px solid var(--border); padding: 16px 0; flex-shrink: 0; }
    .app-sider.is-hidden { width: 0; min-width: 0; opacity: 0; overflow: hidden; padding: 0; border-right: none; }
    .side-nav-container { display: flex; flex-direction: column; gap: 2px; }
    .side-nav-item { padding: 10px 20px; text-decoration: none; color: var(--text2); font-size: 14px; border-radius: 6px; border-left: 3px solid transparent; transition: all .2s; }
    .side-nav-item:hover { color: var(--primary); background: rgba(22, 119, 255, .06); }
    .side-nav-item.is-active { color: var(--primary); background: #e6f4ff; font-weight: 500; border-left-color: var(--primary); }
    .app-content { flex: 1; padding: 24px; overflow: auto; }
    .wb-page { max-width: auto; }
    .wb-section { margin-bottom: 32px; }
    .wb-section:last-child { margin-bottom: 0; }
    .wb-section-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; color: var(--text); }
    .wb-app-list { display: flex; flex-wrap: wrap; gap: 24px 32px; align-items: center; }
    .wb-app-item { display: inline-flex; align-items: center; gap: 10px; text-decoration: none; color: var(--text); font-size: 15px; padding: 8px 0; transition: color .2s; }
    .wb-app-item:hover { color: var(--primary); }
    .wb-app-item .wb-app-icon { width: 32px; height: 32px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; border-radius: 8px; background: rgba(22, 119, 255, .08); color: var(--primary); }
    .wb-app-item:hover .wb-app-icon { background: rgba(22, 119, 255, .15); }
    .ws-card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
    .ws-card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px; border: 1px solid var(--border); transition: box-shadow .2s; }
    .ws-card:hover { box-shadow: 0 8px 24px rgba(0,0,0,.1); }
    .ws-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
    .ws-card-title { font-size: 16px; font-weight: 600; color: var(--text); }
    .ws-card-badge { font-size: 12px; padding: 2px 8px; border-radius: 4px; background: #e6f4ff; color: var(--primary); }
    .ws-card-meta { font-size: 13px; color: var(--text2); margin-bottom: 8px; }
    .ws-card-desc { font-size: 14px; color: var(--text2); line-height: 1.5; margin-bottom: 16px; min-height: 40px; }
    .ws-card-footer { display: flex; justify-content: space-between; align-items: center; padding-top: 12px; border-top: 1px solid var(--border); }
    .ws-card-count { font-size: 13px; color: var(--text2); }
    .ws-card-ops { display: flex; gap: 8px; }
    .btn { height: 32px; padding: 0 14px; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; transition: background .2s; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: #4096ff; }
    .btn-text { background: transparent; color: var(--primary); }
    .wb-section-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .wb-section-head .wb-section-title { margin-bottom: 0; }
    .btn-text:hover { background: rgba(22, 119, 255, .08); }
    .btn-danger { background: transparent; color: #ff4d4f; }
    .btn-danger:hover { background: rgba(255, 77, 79, .08); }
    .btn-default { background: var(--card); border: 1px solid var(--border); color: var(--text); }
    .btn-default:hover { background: #fafafa; border-color: var(--primary); color: var(--primary); }
    .modal-mask { position: fixed; inset: 0; background: rgba(0,0,0,.45); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .modal-mask.is-hidden { display: none; }
    .modal { background: var(--card); border-radius: var(--radius); box-shadow: 0 12px 48px rgba(0,0,0,.15); width: 640px; max-width: 90vw; max-height: 85vh; overflow: hidden; display: flex; flex-direction: column; }
    .modal-header { padding: 16px 24px; border-bottom: 1px solid var(--border); font-size: 16px; font-weight: 600; }
    .modal-body { padding: 24px; overflow: auto; flex: 1; min-height: 0; }
    .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .role-modal-table { width: 100%; border-collapse: collapse; font-size: 14px; }
    .role-modal-table th, .role-modal-table td { padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--border); }
    .role-modal-table th { background: #fafafa; color: var(--text2); font-weight: 500; white-space: nowrap; }
    .role-modal-table .col-ops { white-space: nowrap; }
    .role-modal-table .col-ops .btn { padding: 0 8px; margin-right: 8px; }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="app-logo">平台管理系统</div>
      <nav class="top-nav-container"></nav>
    </header>
    <div class="app-body">
      <aside class="app-sider is-hidden" data-sider="base-control">
        <nav class="side-nav-container"></nav>
      </aside>
      <main id="app-main" class="app-content">
        <div class="wb-page">
          <div class="wb-section">
            <h2 class="wb-section-title">应用</h2>
            <div class="wb-app-list">
              <a href="procurement-agent.html" class="wb-app-item">
                <span class="wb-app-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg></span>
                <span>采购管理智能体</span>
              </a>
              <a href="trusted-data-space.html" class="wb-app-item">
                <span class="wb-app-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/><path d="M12 8v8"/><path d="M8 12h8"/></svg></span>
                <span>可信数据空间</span>
              </a>
            </div>
          </div>
          <div class="wb-section">
            <div class="wb-section-head">
              <h2 class="wb-section-title">工作空间</h2>
              <a href="workspace-create.html" class="btn btn-primary">新增工作空间</a>
            </div>
            <div class="ws-card-grid" id="wsCardGrid"></div>
          </div>
        </div>
      </main>
    </div>
  </div>
  <div class="modal-mask is-hidden" id="roleMgmtModal">
    <div class="modal">
      <div class="modal-header" id="roleMgmtModalTitle">角色管理</div>
      <div class="modal-body">
        <table class="role-modal-table">
          <thead>
            <tr>
              <th>角色名称</th>
              <th>角色类型</th>
              <th>描述</th>
              <th class="col-ops">操作</th>
            </tr>
          </thead>
          <tbody id="roleMgmtTableBody"></tbody>
        </table>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-primary" id="roleMgmtAddBtn" disabled title="暂未开放">新增角色</button>
        <button type="button" class="btn btn-default" id="roleMgmtCloseBtn">关闭</button>
      </div>
    </div>
  </div>
  <script src="./common.js"></script>
  <script>
    initLayout();

    (function () {
      var defaultWorkspaceList = [
        { id: 'ws0', name: '公共空间', creator: 'system', createTime: '2024-01-01 09:00:00', desc: '所有用户均可访问的公共工作空间', isPublic: true },
        { id: 'ws1', name: '研发工作空间', creator: 'admin', createTime: '2024-01-05 10:00:00', desc: '技术研发团队协作空间', isPublic: false },
        { id: 'ws2', name: '产品工作空间', creator: 'admin', createTime: '2024-01-05 11:00:00', desc: '产品规划与设计协作空间', isPublic: false },
        { id: 'ws3', name: '市场工作空间', creator: 'admin', createTime: '2024-01-05 14:00:00', desc: '市场推广与运营协作空间', isPublic: false }
      ];

      var workspaceList = JSON.parse(localStorage.getItem('workspaceList') || 'null');
      if (!workspaceList || workspaceList.length === 0) {
        workspaceList = JSON.parse(JSON.stringify(defaultWorkspaceList));
        localStorage.setItem('workspaceList', JSON.stringify(workspaceList));
      }

      function getUserCountByWorkspace(ws) {
        if (ws.userIds && ws.userIds.length > 0) {
          return ws.userIds.length;
        }
        var userList = JSON.parse(localStorage.getItem('userList') || '[]');
        var count = 0;
        userList.forEach(function (u) {
          var spaceRoles = u.spaceRoles || [];
          if (spaceRoles.some(function (sr) { return sr.workspaceId === ws.id; })) {
            count++;
          }
        });
        return count;
      }

      function renderCards() {
        var grid = document.getElementById('wsCardGrid');
        grid.innerHTML = workspaceList.map(function (ws) {
          var userCount = getUserCountByWorkspace(ws);
          var publicClass = ws.isPublic ? ' ws-card-public' : '';
          var badgeHtml = ws.isPublic ? '<span class="ws-card-badge">公共空间</span>' : '';
          return '<div class="ws-card' + publicClass + '" data-id="' + ws.id + '">' +
            '<div class="ws-card-header">' +
              '<span class="ws-card-title">' + (ws.name || '-') + '</span>' +
              badgeHtml +
            '</div>' +
            '<div class="ws-card-meta">创建人：' + (ws.creator || '-') + '</div>' +
            '<div class="ws-card-meta">创建时间：' + (ws.createTime || '-') + '</div>' +
            '<div class="ws-card-desc">' + (ws.desc || '-') + '</div>' +
            '<div class="ws-card-footer">' +
              '<span class="ws-card-count">用户数：' + userCount + '</span>' +
              '<div class="ws-card-ops">' +
                (ws.isPublic ? '' : '<button type="button" class="btn btn-text btn-role-mgmt" data-id="' + ws.id + '">角色管理</button>' +
                '<button type="button" class="btn btn-text btn-edit" data-id="' + ws.id + '">编辑</button>' +
                '<button type="button" class="btn btn-danger btn-delete" data-id="' + ws.id + '">删除</button>') +
              '</div>' +
            '</div>' +
            '</div>';
        }).join('');

        grid.querySelectorAll('.btn-role-mgmt').forEach(function (btn) {
          btn.addEventListener('click', function () { openRoleMgmtModal(btn.dataset.id); });
        });

        grid.querySelectorAll('.btn-edit').forEach(function (btn) {
          btn.addEventListener('click', function () {
            window.location.href = 'workspace-edit.html?id=' + encodeURIComponent(btn.dataset.id);
          });
        });

        grid.querySelectorAll('.btn-delete').forEach(function (btn) {
          btn.addEventListener('click', function () {
            var ws = workspaceList.find(function (x) { return x.id === btn.dataset.id; });
            if (!ws) return;
            if (confirm('确定要删除工作空间「' + ws.name + '」吗？')) {
              workspaceList = workspaceList.filter(function (x) { return x.id !== btn.dataset.id; });
              localStorage.setItem('workspaceList', JSON.stringify(workspaceList));
              renderCards();
            }
          });
        });
      }

      function getRolesByWorkspace(wsId) {
        var roleList = JSON.parse(localStorage.getItem('roleList') || 'null') || [];
        return roleList.filter(function (r) {
          if (r.level !== '开发角色') return false;
          return !r.workspaceId || r.workspaceId === wsId;
        });
      }

      function openRoleMgmtModal(wsId) {
        var ws = workspaceList.find(function (x) { return x.id === wsId; });
        if (!ws) return;
        document.getElementById('roleMgmtModalTitle').textContent = ws.name + ' - 角色管理';
        var roleList = JSON.parse(localStorage.getItem('roleList') || 'null') || [];
        var roles = getRolesByWorkspace(wsId);
        var tbody = document.getElementById('roleMgmtTableBody');
        tbody.innerHTML = roles.map(function (r) {
          var ops = r.type === '系统默认' ? '-' : '<a href="role-edit.html?id=' + encodeURIComponent(r.id) + '" class="btn btn-text">编辑</a><button type="button" class="btn btn-danger btn-role-delete" data-id="' + r.id + '">删除</button>';
          return '<tr data-id="' + r.id + '">' +
            '<td>' + (r.name || '-') + '</td>' +
            '<td>' + (r.type || '-') + '</td>' +
            '<td>' + (r.desc || '-') + '</td>' +
            '<td class="col-ops">' + ops + '</td></tr>';
        }).join('');
        tbody.querySelectorAll('.btn-role-delete').forEach(function (btn) {
          btn.addEventListener('click', function () {
            var r = roleList.find(function (x) { return x.id === btn.dataset.id; });
            if (!r) return;
            if (r.type === '系统默认') {
              alert('系统默认角色不允许删除');
              return;
            }
            if (confirm('确定要删除角色「' + r.name + '」吗？')) {
              var newRoleList = roleList.filter(function (x) { return x.id !== btn.dataset.id; });
              localStorage.setItem('roleList', JSON.stringify(newRoleList));
              openRoleMgmtModal(wsId);
            }
          });
        });
        document.getElementById('roleMgmtModal').classList.remove('is-hidden');
      }

      document.getElementById('roleMgmtCloseBtn').addEventListener('click', function () {
        document.getElementById('roleMgmtModal').classList.add('is-hidden');
      });

      renderCards();
    })();
  </script>
</body>
</html>
