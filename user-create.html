<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新增用户 - 平台管理系统</title>
  <style>
    :root {
      --primary: #1677ff;
      --bg: #f5f7fb;
      --card: #fff;
      --border: rgba(5,5,5,.10);
      --text: rgba(0,0,0,.88);
      --text2: rgba(0,0,0,.65);
      --radius: 10px;
      --shadow: 0 6px 20px rgba(0,0,0,.06);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .app-shell { min-height: 100vh; display: flex; flex-direction: column; }
    .app-header { height: 64px; background: var(--card); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 24px; gap: 48px; }
    .app-logo { font-size: 18px; font-weight: 600; color: var(--primary); white-space: nowrap; }
    .top-nav-container { display: flex; gap: 4px; flex: 1; }
    .top-nav-item { padding: 8px 16px; text-decoration: none; color: var(--text); border-radius: 6px; font-size: 14px; transition: background .2s, color .2s; position: relative; }
    .top-nav-item:hover { background: rgba(22, 119, 255, .08); color: var(--primary); }
    .top-nav-item.is-active { color: var(--primary); font-weight: 500; background: #e6f4ff; }
    .top-nav-item.is-active::after { content: ''; position: absolute; bottom: 0; left: 16px; right: 16px; height: 2px; background: var(--primary); border-radius: 1px; }
    .app-body { flex: 1; display: flex; min-height: 0; }
    .app-sider { width: 220px; background: var(--card); border-right: 1px solid var(--border); padding: 16px 0; flex-shrink: 0; }
    .app-sider.is-hidden { width: 0; min-width: 0; opacity: 0; overflow: hidden; padding: 0; border-right: none; }
    .side-nav-container { display: flex; flex-direction: column; gap: 2px; }
    .side-nav-item { padding: 10px 20px; text-decoration: none; color: var(--text2); font-size: 14px; border-radius: 6px; border-left: 3px solid transparent; transition: all .2s; }
    .side-nav-item:hover { color: var(--primary); background: rgba(22, 119, 255, .06); }
    .side-nav-item.is-active { color: var(--primary); background: #e6f4ff; font-weight: 500; border-left-color: var(--primary); }
    .app-content { flex: 1; padding: 24px; overflow: auto; }
    .create-page { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 32px; }
    .create-title { font-size: 20px; font-weight: 600; margin-bottom: 24px; color: var(--text); }
    .form-section { margin-bottom: 28px; }
    .form-section-title { font-size: 15px; font-weight: 600; margin-bottom: 16px; color: var(--text); padding-bottom: 8px; border-bottom: 1px solid var(--border); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 16px; }
    .form-row.full { grid-template-columns: 1fr; }
    .form-item { margin-bottom: 16px; }
    .form-item:last-child { margin-bottom: 0; }
    .form-row .form-item { margin-bottom: 0; }
    .form-label { display: block; margin-bottom: 8px; font-size: 14px; color: var(--text); }
    .form-label .required { color: #ff4d4f; }
    .form-input, .form-select, .form-textarea { width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; }
    .form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--primary); }
    .form-textarea { min-height: 80px; resize: vertical; }
    .parttime-list { margin-bottom: 12px; }
    .parttime-item { display: flex; gap: 12px; align-items: flex-start; margin-bottom: 12px; }
    .parttime-item .form-item { flex: 1; }
    .parttime-item .form-select { min-width: 200px; }
    .parttime-item .form-input { min-width: 160px; }
    .parttime-item .btn-remove { flex-shrink: 0; height: 36px; padding: 0 12px; border: 1px solid var(--border); border-radius: 6px; background: var(--card); color: var(--text2); cursor: pointer; font-size: 14px; }
    .parttime-item .btn-remove:hover { border-color: #ff4d4f; color: #ff4d4f; }
    .btn-add-parttime { height: 36px; padding: 0 16px; border: 1px dashed var(--border); border-radius: 6px; background: #fafafa; color: var(--primary); cursor: pointer; font-size: 14px; }
    .btn-add-parttime:hover { border-color: var(--primary); background: rgba(22, 119, 255, .04); }
    .form-actions { margin-top: 28px; padding-top: 24px; border-top: 1px solid var(--border); display: flex; gap: 12px; }
    .btn { height: 36px; padding: 0 20px; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; transition: background .2s; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: #4096ff; }
    .btn-default { background: var(--card); border: 1px solid var(--border); color: var(--text); }
    .btn-default:hover { background: #fafafa; border-color: var(--primary); color: var(--primary); }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="app-logo">平台管理系统</div>
      <nav class="top-nav-container"></nav>
    </header>
    <div class="app-body">
      <aside class="app-sider is-hidden" data-sider="base-control">
        <nav class="side-nav-container"></nav>
      </aside>
      <main id="app-main" class="app-content">
        <div class="create-page">
          <h1 class="create-title">新增用户</h1>
          <form id="userCreateForm">
            <div class="form-section">
              <div class="form-section-title">基础信息</div>
              <div class="form-row">
                <div class="form-item">
                  <label class="form-label">账号 <span class="required">*</span></label>
                  <input type="text" class="form-input" id="account" name="account" placeholder="请输入账号" required>
                </div>
                <div class="form-item">
                  <label class="form-label">密码 <span class="required">*</span></label>
                  <input type="password" class="form-input" id="password" name="password" placeholder="请输入密码" required>
                </div>
              </div>
              <div class="form-row">
                <div class="form-item">
                  <label class="form-label">姓名 <span class="required">*</span></label>
                  <input type="text" class="form-input" id="name" name="name" placeholder="请输入姓名" required>
                </div>
                <div class="form-item">
                  <label class="form-label">启用 <span class="required">*</span></label>
                  <select class="form-select" id="enabled" name="enabled">
                    <option value="1">是</option>
                    <option value="0">否</option>
                  </select>
                </div>
              </div>
              <div class="form-row">
                <div class="form-item">
                  <label class="form-label">电子邮箱</label>
                  <input type="email" class="form-input" id="email" name="email" placeholder="请输入电子邮箱">
                </div>
                <div class="form-item">
                  <label class="form-label">手机号码</label>
                  <input type="text" class="form-input" id="phone" name="phone" placeholder="请输入手机号码">
                </div>
              </div>
              <div class="form-row">
                <div class="form-item">
                  <label class="form-label">所属组织 <span class="required">*</span></label>
                  <select class="form-select" id="orgId" name="orgId" required>
                    <option value="">请选择所属组织</option>
                  </select>
                </div>
                <div class="form-item">
                  <label class="form-label">岗位</label>
                  <input type="text" class="form-input" id="position" name="position" placeholder="请输入岗位">
                </div>
              </div>
              <div class="form-row">
                <div class="form-item">
                  <label class="form-label">兼职组织</label>
                  <div class="parttime-list" id="parttimeList"></div>
                  <button type="button" class="btn btn-add-parttime" id="btnAddParttime">+ 添加兼职组织</button>
                </div>
              </div>
            </div>
            <div class="form-section">
              <div class="form-section-title">描述</div>
              <div class="form-item">
                <textarea class="form-textarea" id="desc" name="desc" placeholder="请输入描述"></textarea>
              </div>
            </div>
            <div class="form-actions">
              <button type="submit" class="btn btn-primary">提交</button>
              <a href="javascript:void(0)" class="btn btn-default" id="btnCancel">取消</a>
            </div>
          </form>
        </div>
      </main>
    </div>
  </div>
  <script src="./common.js"></script>
  <script>
    initLayout();

    (function () {
      var orgData = [
        { id: 'org-1', name: '总公司', children: [
          { id: 'org-2', name: '技术研发部', children: [
            { id: 'org-4', name: '前端组', children: [
              { id: 'org-7', name: 'UI 小组', children: [] }
            ]},
            { id: 'org-5', name: '后端组', children: [] }
          ]},
          { id: 'org-3', name: '市场部', children: [
            { id: 'org-6', name: '品牌推广组', children: [] }
          ]}
        ]}
      ];

      function flattenOrgWithDepth(nodes, list, depth) {
        list = list || [];
        depth = depth || 0;
        nodes.forEach(function (n) {
          list.push({ id: n.id, name: n.name, depth: depth });
          if (n.children && n.children.length) flattenOrgWithDepth(n.children, list, depth + 1);
        });
        return list;
      }
      var orgListFlat = flattenOrgWithDepth(orgData);
      var indentChar = '\u3000\u3000';

      function renderOrgSelect(sel, firstText) {
        firstText = firstText || '请选择组织';
        sel.innerHTML = '<option value="">' + firstText + '</option>';
        orgListFlat.forEach(function (o) {
          var opt = document.createElement('option');
          opt.value = o.id;
          opt.textContent = (indentChar.repeat(o.depth)) + o.name;
          sel.appendChild(opt);
        });
      }

      renderOrgSelect(document.getElementById('orgId'), '请选择所属组织');

      (function () {
        var params = new URLSearchParams(window.location.search);
        var orgId = params.get('orgId');
        if (orgId) {
          var sel = document.getElementById('orgId');
          for (var i = 0; i < sel.options.length; i++) {
            if (sel.options[i].value === orgId) {
              sel.value = orgId;
              break;
            }
          }
        }
      })();

      var parttimeIndex = 0;
      function addParttimeItem() {
        var container = document.getElementById('parttimeList');
        var div = document.createElement('div');
        div.className = 'parttime-item';
        div.dataset.index = parttimeIndex++;
        div.innerHTML = '<div class="form-item" style="flex:1;"><select class="form-select parttime-org"><option value="">请选择兼职组织</option></select></div>' +
          '<div class="form-item" style="flex:1;"><input type="text" class="form-input parttime-pos" placeholder="兼职岗位"></div>' +
          '<button type="button" class="btn-remove" data-action="remove">删除</button>';
        container.appendChild(div);
        var orgSel = div.querySelector('.parttime-org');
        renderOrgSelect(orgSel, '请选择兼职组织');
        div.querySelector('[data-action="remove"]').addEventListener('click', function () {
          div.remove();
        });
      }

      document.getElementById('btnAddParttime').addEventListener('click', addParttimeItem);

      document.getElementById('btnCancel').addEventListener('click', function () {
        history.back();
      });

      document.getElementById('userCreateForm').addEventListener('submit', function (e) {
        e.preventDefault();
        var account = document.getElementById('account').value.trim();
        var password = document.getElementById('password').value;
        var name = document.getElementById('name').value.trim();
        var orgId = document.getElementById('orgId').value;
        if (!account) { alert('请输入账号'); return; }
        if (!password) { alert('请输入密码'); return; }
        if (!name) { alert('请输入姓名'); return; }
        if (!orgId) { alert('请选择所属组织'); return; }
        var parttimes = [];
        document.querySelectorAll('.parttime-item').forEach(function (item) {
          var org = item.querySelector('.parttime-org').value;
          var pos = item.querySelector('.parttime-pos').value.trim();
          if (org || pos) parttimes.push({ orgId: org, position: pos });
        });
        var data = {
          account: account,
          name: name,
          role: document.getElementById('role').value,
          email: document.getElementById('email').value.trim(),
          phone: document.getElementById('phone').value.trim(),
          orgId: orgId,
          position: document.getElementById('position').value.trim(),
          parttimes: parttimes,
          desc: document.getElementById('desc').value.trim()
        };
        console.log('提交数据:', data);
        alert('用户创建成功（演示模式，未持久化）');
        history.back();
      });
    })();
  </script>
</body>
</html>
