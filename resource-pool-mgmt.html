<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>资源池管理 - 平台管理系统</title>
  <style>
    :root {
      --primary: #1677ff;
      --bg: #f5f7fb;
      --card: #fff;
      --border: rgba(5,5,5,.10);
      --text: rgba(0,0,0,.88);
      --text2: rgba(0,0,0,.65);
      --radius: 10px;
      --shadow: 0 6px 20px rgba(0,0,0,.06);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .app-shell { min-height: 100vh; display: flex; flex-direction: column; }
    .app-header { height: 64px; background: var(--card); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 24px; gap: 48px; }
    .app-logo { font-size: 18px; font-weight: 600; color: var(--primary); white-space: nowrap; }
    .top-nav-container { display: flex; gap: 4px; flex: 1; }
    .top-nav-item { padding: 8px 16px; text-decoration: none; color: var(--text); border-radius: 6px; font-size: 14px; transition: background .2s, color .2s; position: relative; }
    .top-nav-item:hover { background: rgba(22, 119, 255, .08); color: var(--primary); }
    .top-nav-item.is-active { color: var(--primary); font-weight: 500; background: #e6f4ff; }
    .top-nav-item.is-active::after { content: ''; position: absolute; bottom: 0; left: 16px; right: 16px; height: 2px; background: var(--primary); border-radius: 1px; }
    .app-body { flex: 1; display: flex; min-height: 0; }
    .app-sider { width: 220px; background: var(--card); border-right: 1px solid var(--border); padding: 16px 0; flex-shrink: 0; }
    .app-sider.is-hidden { width: 0; min-width: 0; opacity: 0; overflow: hidden; padding: 0; border-right: none; }
    .side-nav-container { display: flex; flex-direction: column; gap: 2px; }
    .side-nav-item { padding: 10px 20px; text-decoration: none; color: var(--text2); font-size: 14px; border-radius: 6px; border-left: 3px solid transparent; transition: all .2s; }
    .side-nav-item:hover { color: var(--primary); background: rgba(22, 119, 255, .06); }
    .side-nav-item.is-active { color: var(--primary); background: #e6f4ff; font-weight: 500; border-left-color: var(--primary); }
    .app-content { flex: 1; padding: 24px; overflow: auto; display: flex; flex-direction: column; }
    .page { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 24px; flex: 1; display: flex; flex-direction: column; min-height: 0; }
    .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
    .page-title { font-size: 20px; font-weight: 600; margin: 0; color: var(--text); }
    .btn { height: 32px; padding: 0 16px; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; transition: background .2s; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: #4096ff; }
    .btn-text { background: transparent; color: var(--primary); }
    .btn-text:hover { background: rgba(22, 119, 255, .08); }
    .btn-danger { background: transparent; color: #ff4d4f; }
    .btn-danger:hover { background: rgba(255, 77, 79, .08); }
    .btn-default { background: var(--card); border: 1px solid var(--border); color: var(--text); }
    .btn-default:hover { background: #fafafa; border-color: var(--primary); color: var(--primary); }
    .table-wrap { flex: 1; overflow: auto; }
    .data-table { width: 100%; border-collapse: collapse; font-size: 14px; }
    .data-table th, .data-table td { padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--border); }
    .data-table th { background: #fafafa; color: var(--text2); font-weight: 500; white-space: nowrap; }
    .data-table td { color: var(--text); }
    .data-table .col-ops { white-space: nowrap; }
    .data-table .col-ops .btn { padding: 0 8px; margin-right: 8px; }
    .modal-mask { position: fixed; inset: 0; background: rgba(0,0,0,.45); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .modal-mask.is-hidden { display: none; }
    .modal { background: var(--card); border-radius: var(--radius); box-shadow: 0 12px 48px rgba(0,0,0,.15); width: 560px; max-width: 90vw; max-height: 85vh; overflow: hidden; display: flex; flex-direction: column; }
    .modal-header { padding: 16px 24px; border-bottom: 1px solid var(--border); font-size: 16px; font-weight: 600; }
    .modal-body { padding: 24px; overflow: auto; flex: 1; }
    .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }
    .form-item { margin-bottom: 16px; }
    .form-label { display: block; margin-bottom: 8px; font-size: 14px; color: var(--text); }
    .form-label .required { color: #ff4d4f; }
    .form-input, .form-select { width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; }
    .form-input:focus, .form-select:focus { outline: none; border-color: var(--primary); }
    .form-row { display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 12px; }
    .form-row .form-item { min-width: 140px; margin-bottom: 0; }
    .scope-checkbox-group { display: flex; flex-wrap: wrap; gap: 12px 24px; }
    .scope-checkbox-item { display: flex; align-items: center; gap: 6px; font-size: 14px; cursor: pointer; }
    .scope-checkbox-item input { cursor: pointer; }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="app-logo">平台管理系统</div>
      <nav class="top-nav-container"></nav>
    </header>
    <div class="app-body">
      <aside class="app-sider is-hidden" data-sider="base-control">
        <nav class="side-nav-container"></nav>
      </aside>
      <main id="app-main" class="app-content">
        <div class="page">
          <div class="page-header">
            <h1 class="page-title">资源池管理</h1>
            <button type="button" class="btn btn-primary" id="btnAdd">新增资源池</button>
          </div>
          <div class="table-wrap">
            <table class="data-table">
              <thead>
                <tr>
                  <th>资源池名称</th>
                  <th>CPU（剩余/总）</th>
                  <th>内存（剩余/总）</th>
                  <th>GPU（剩余/总）</th>
                  <th>可用范围</th>
                  <th>创建人</th>
                  <th>创建时间</th>
                  <th class="col-ops">操作</th>
                </tr>
              </thead>
              <tbody id="tableBody"></tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
  </div>
  <div class="modal-mask is-hidden" id="editModal">
    <div class="modal">
      <div class="modal-header" id="modalTitle">新增资源池</div>
      <div class="modal-body">
        <div class="form-item">
          <label class="form-label">资源池名称 <span class="required">*</span></label>
          <input type="text" class="form-input" id="modalName" placeholder="请输入资源池名称">
        </div>
        <div class="form-item">
          <label class="form-label">选择机器池 <span class="required">*</span></label>
          <select class="form-select" id="modalMpSelect"><option value="">请选择机器池</option></select>
        </div>
        <div class="form-row pool-dynamic" id="modalPoolDynamic" style="display:none;">
          <div class="form-item pool-gpu-row" style="display:none;"><label class="form-label">卡型</label><input type="text" class="form-input" id="modalGpuModel" readonly style="background:#f5f5f5;"></div>
          <div class="form-item pool-cpu-row" style="display:none;"><label class="form-label">CPU（核）</label><input type="number" class="form-input" id="modalCpu" min="0" placeholder="上限"></div>
          <div class="form-item pool-mem-row" style="display:none;"><label class="form-label">内存（GiB）</label><input type="number" class="form-input" id="modalMem" min="0" placeholder="上限"></div>
          <div class="form-item pool-gpu-row2" style="display:none;"><label class="form-label">GPU（张）</label><input type="number" class="form-input" id="modalGpu" min="0" placeholder="上限"></div>
        </div>
        <div class="form-item">
          <label class="form-label">可用范围</label>
          <div class="scope-checkbox-group" id="modalScopeGroup"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-default" id="modalCancel">取消</button>
        <button type="button" class="btn btn-primary" id="modalConfirm">确定</button>
      </div>
    </div>
  </div>
  <script src="./common.js"></script>
  <script>
    initLayout();

    (function () {
      var SCOPE_OPTIONS = [
        { name: '模型开发', value: 'model-dev' },
        { name: '模型管理', value: 'model-mgmt' },
        { name: '服务管理', value: 'service-mgmt' },
        { name: '镜像管理', value: 'image-mgmt' }
      ];

      var defaultMachinePools = [
        { id: 'mp1', name: '测试机器池', cpuUsed: 81, cpuTotal: 622, memUsed: 3486, memTotal: 5062, gpuUsed: 3, gpuTotal: 16, gpuModel: 'A100' },
        { id: 'mp2', name: 'dev-cluster', cpuUsed: 81, cpuTotal: 622, memUsed: 3486, memTotal: 5062, gpuUsed: 5, gpuTotal: 24, gpuModel: 'V100' }
      ];
      var machinePoolList = JSON.parse(localStorage.getItem('machinePoolList') || 'null');
      if (!machinePoolList || machinePoolList.length === 0) {
        machinePoolList = JSON.parse(JSON.stringify(defaultMachinePools));
        localStorage.setItem('machinePoolList', JSON.stringify(machinePoolList));
      }

      var defaultResourcePools = [
        { id: 'pool1', name: '测试资源池', creator: 'admin', createTime: '2024-01-10 10:00:00', bindings: [
          { machinePoolId: 'mp1', cpu: 100, mem: 500, gpu: 2, scopes: ['model-dev'] }
        ]},
        { id: 'pool2', name: 'dev-cluster资源池', creator: 'admin', createTime: '2024-01-10 11:00:00', bindings: [
          { machinePoolId: 'mp2', cpu: 200, mem: 1000, gpu: 4, scopes: ['model-dev', 'service-mgmt'] }
        ]}
      ];
      var poolList = JSON.parse(localStorage.getItem('resourcePoolList') || 'null');
      if (!poolList || poolList.length === 0) {
        poolList = JSON.parse(JSON.stringify(defaultResourcePools));
        localStorage.setItem('resourcePoolList', JSON.stringify(poolList));
      }

      function getMachinePoolDisplay(mp) {
        var parts = [];
        if (mp.cpuTotal) parts.push('CPU:' + (mp.cpuUsed||0) + '/' + mp.cpuTotal + '核');
        if (mp.memTotal) parts.push('内存:' + (mp.memUsed||0) + '/' + mp.memTotal + 'GiB');
        if (mp.gpuTotal) parts.push('GPU:' + (mp.gpuUsed||0) + '/' + mp.gpuTotal + '张');
        return mp.name + '（' + parts.join('；') + '）';
      }

      function resolveBindings(bindings) {
        return (bindings || []).map(function (b) {
          var mp = machinePoolList.find(function (x) { return x.id === b.machinePoolId; });
          return { mp: mp, cpu: b.cpu, mem: b.mem, gpu: b.gpu, scopes: b.scopes || [] };
        }).filter(function (x) { return x.mp; });
      }

      var editId = null;

      function updatePoolModalFields() {
        var sel = document.getElementById('modalMpSelect');
        var dyn = document.getElementById('modalPoolDynamic');
        var gpuRow = dyn.querySelector('.pool-gpu-row');
        var cpuRow = dyn.querySelector('.pool-cpu-row');
        var memRow = dyn.querySelector('.pool-mem-row');
        var gpuRow2 = dyn.querySelector('.pool-gpu-row2');
        var mp = machinePoolList.find(function (x) { return x.id === sel.value; });
        if (!mp) { dyn.style.display = 'none'; return; }
        dyn.style.display = '';
        gpuRow.style.display = mp.gpuTotal ? '' : 'none';
        gpuRow2.style.display = mp.gpuTotal ? '' : 'none';
        cpuRow.style.display = mp.cpuTotal ? '' : 'none';
        memRow.style.display = mp.memTotal ? '' : 'none';
        document.getElementById('modalGpuModel').value = mp.gpuModel || '';
        var cpuR = mp.cpuTotal - (mp.cpuUsed || 0);
        var memR = mp.memTotal - (mp.memUsed || 0);
        var gpuR = mp.gpuTotal - (mp.gpuUsed || 0);
        var cpuInput = document.getElementById('modalCpu');
        var memInput = document.getElementById('modalMem');
        var gpuInput = document.getElementById('modalGpu');
        cpuInput.max = cpuR;
        cpuInput.placeholder = '上限' + cpuR + '核';
        memInput.max = memR;
        memInput.placeholder = '上限' + memR + 'GiB';
        gpuInput.max = gpuR;
        gpuInput.placeholder = '上限' + gpuR + '张';
      }

      function renderTable() {
        var tbody = document.getElementById('tableBody');
        tbody.innerHTML = poolList.map(function (p) {
          var resolved = resolveBindings(p.bindings);
          var cpuStr = '-', memStr = '-', gpuStr = '-';
          var scopeParts = [];
          if (resolved.length > 0) {
            var first = resolved[0];
            var mp = first.mp;
            if (mp.cpuTotal) cpuStr = (mp.cpuTotal - (mp.cpuUsed||0)) + '/' + mp.cpuTotal + '核';
            if (mp.memTotal) memStr = (mp.memTotal - (mp.memUsed||0)) + '/' + mp.memTotal + 'GiB';
            if (mp.gpuTotal) gpuStr = (mp.gpuTotal - (mp.gpuUsed||0)) + '/' + mp.gpuTotal + '张';
            resolved.forEach(function (r) {
              (r.scopes || []).forEach(function (s) {
                var o = SCOPE_OPTIONS.find(function (x) { return x.value === s; });
                if (o && scopeParts.indexOf(o.name) === -1) scopeParts.push(o.name);
              });
            });
          }
          var scopeStr = scopeParts.join('、') || '-';
          return '<tr data-id="' + p.id + '">' +
            '<td>' + (p.name || '-') + '</td>' +
            '<td>' + cpuStr + '</td>' +
            '<td>' + memStr + '</td>' +
            '<td>' + gpuStr + '</td>' +
            '<td>' + scopeStr + '</td>' +
            '<td>' + (p.creator || '-') + '</td>' +
            '<td>' + (p.createTime || '-') + '</td>' +
            '<td class="col-ops">' +
            '<button type="button" class="btn btn-text btn-edit" data-id="' + p.id + '">编辑</button>' +
            '<button type="button" class="btn btn-danger btn-delete" data-id="' + p.id + '">删除</button>' +
            '</td></tr>';
        }).join('');
        tbody.querySelectorAll('.btn-edit').forEach(function (btn) {
          btn.addEventListener('click', function () { openModal(btn.dataset.id); });
        });
        tbody.querySelectorAll('.btn-delete').forEach(function (btn) {
          btn.addEventListener('click', function () {
            var p = poolList.find(function (x) { return x.id === btn.dataset.id; });
            if (!p) return;
            if (confirm('确定要删除资源池「' + p.name + '」吗？')) {
              poolList = poolList.filter(function (x) { return x.id !== btn.dataset.id; });
              localStorage.setItem('resourcePoolList', JSON.stringify(poolList));
              renderTable();
            }
          });
        });
      }

      function openModal(id) {
        editId = id || null;
        document.getElementById('modalTitle').textContent = editId ? '编辑资源池' : '新增资源池';
        document.getElementById('modalName').value = '';
        var sel = document.getElementById('modalMpSelect');
        sel.innerHTML = '<option value="">请选择机器池</option>' +
          machinePoolList.map(function (mp) { return '<option value="' + mp.id + '">' + getMachinePoolDisplay(mp) + '</option>'; }).join('');
        sel.value = '';
        document.getElementById('modalCpu').value = '';
        document.getElementById('modalMem').value = '';
        document.getElementById('modalGpu').value = '';
        var scopeGroup = document.getElementById('modalScopeGroup');
        scopeGroup.innerHTML = SCOPE_OPTIONS.map(function (o) {
          return '<label class="scope-checkbox-item"><input type="checkbox" class="pool-scope" value="' + o.value + '">' + o.name + '</label>';
        }).join('');
        if (editId) {
          var p = poolList.find(function (x) { return x.id === editId; });
          if (p && p.bindings && p.bindings[0]) {
            var b = p.bindings[0];
            document.getElementById('modalName').value = p.name || '';
            sel.value = b.machinePoolId || '';
            document.getElementById('modalCpu').value = b.cpu || '';
            document.getElementById('modalMem').value = b.mem || '';
            document.getElementById('modalGpu').value = b.gpu || '';
            (b.scopes || []).forEach(function (v) {
              var cb = scopeGroup.querySelector('.pool-scope[value="' + v + '"]');
              if (cb) cb.checked = true;
            });
          }
        }
        updatePoolModalFields();
        document.getElementById('editModal').classList.remove('is-hidden');
      }

      document.getElementById('btnAdd').addEventListener('click', function () { openModal(null); });
      document.getElementById('modalMpSelect').addEventListener('change', updatePoolModalFields);

      document.getElementById('modalCancel').addEventListener('click', function () {
        document.getElementById('editModal').classList.add('is-hidden');
      });

      document.getElementById('modalConfirm').addEventListener('click', function () {
        var name = document.getElementById('modalName').value.trim();
        if (!name) { alert('请输入资源池名称'); return; }
        var mpId = document.getElementById('modalMpSelect').value;
        if (!mpId) { alert('请选择机器池'); return; }
        var scopes = [];
        document.querySelectorAll('#modalScopeGroup .pool-scope:checked').forEach(function (cb) { scopes.push(cb.value); });
        var cpu = parseInt(document.getElementById('modalCpu').value, 10) || 0;
        var mem = parseInt(document.getElementById('modalMem').value, 10) || 0;
        var gpu = parseInt(document.getElementById('modalGpu').value, 10) || 0;
        var bindings = [{ machinePoolId: mpId, cpu: cpu, mem: mem, gpu: gpu, scopes: scopes }];
        if (editId) {
          var p = poolList.find(function (x) { return x.id === editId; });
          if (p) {
            p.name = name;
            p.bindings = bindings;
          }
        } else {
          var newId = 'pool' + Date.now();
          poolList.push({ id: newId, name: name, creator: 'admin', createTime: new Date().toLocaleString(), bindings: bindings });
        }
        localStorage.setItem('resourcePoolList', JSON.stringify(poolList));
        document.getElementById('editModal').classList.add('is-hidden');
        renderTable();
      });

      renderTable();
    })();
  </script>
</body>
</html>
