<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>组织管理 - 平台管理系统</title>
  <style>
    :root {
      --primary: #1677ff;
      --bg: #f5f7fb;
      --card: #fff;
      --border: rgba(5,5,5,.10);
      --text: rgba(0,0,0,.88);
      --text2: rgba(0,0,0,.65);
      --radius: 10px;
      --shadow: 0 6px 20px rgba(0,0,0,.06);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .app-shell { min-height: 100vh; display: flex; flex-direction: column; }
    .app-header { height: 64px; background: var(--card); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 24px; gap: 48px; }
    .app-logo { font-size: 18px; font-weight: 600; color: var(--primary); white-space: nowrap; }
    .top-nav-container { display: flex; gap: 4px; flex: 1; }
    .top-nav-item { padding: 8px 16px; text-decoration: none; color: var(--text); border-radius: 6px; font-size: 14px; transition: background .2s, color .2s; position: relative; }
    .top-nav-item:hover { background: rgba(22, 119, 255, .08); color: var(--primary); }
    .top-nav-item.is-active { color: var(--primary); font-weight: 500; background: #e6f4ff; }
    .top-nav-item.is-active::after { content: ''; position: absolute; bottom: 0; left: 16px; right: 16px; height: 2px; background: var(--primary); border-radius: 1px; }
    .app-body { flex: 1; display: flex; min-height: 0; }
    .app-sider { width: 220px; background: var(--card); border-right: 1px solid var(--border); padding: 16px 0; flex-shrink: 0; }
    .app-sider.is-hidden { width: 0; min-width: 0; opacity: 0; overflow: hidden; padding: 0; border-right: none; }
    .side-nav-container { display: flex; flex-direction: column; gap: 2px; }
    .side-nav-item { padding: 10px 20px; text-decoration: none; color: var(--text2); font-size: 14px; border-radius: 6px; border-left: 3px solid transparent; transition: all .2s; }
    .side-nav-item:hover { color: var(--primary); background: rgba(22, 119, 255, .06); }
    .side-nav-item.is-active { color: var(--primary); background: #e6f4ff; font-weight: 500; border-left-color: var(--primary); }
    .app-content { flex: 1; padding: 24px; overflow: auto; display: flex; flex-direction: column; }
    .org-page { display: flex; gap: 24px; flex: 1; min-height: 0; }
    .org-left { width: 320px; flex-shrink: 0; background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); display: flex; flex-direction: column; overflow: hidden; }
    .org-left-title { padding: 16px 16px 12px; font-size: 16px; font-weight: 600; color: #1f1f1f; }
    .org-left-head { padding: 0 16px 16px; border-bottom: 1px solid var(--border); display: flex; gap: 8px; align-items: center; }
    .org-search-wrap { flex: 1; min-width: 0; position: relative; display: flex; align-items: center; }
    .org-search { width: 100%; height: 32px; padding: 0 32px 0 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; }
    .org-search:focus { outline: none; border-color: var(--primary); }
    .org-search-icon { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; color: #999; pointer-events: none; }
    .org-search-icon svg { width: 100%; height: 100%; }
    .btn-add-org { width: 32px; height: 32px; min-width: 32px; padding: 0; display: flex; align-items: center; justify-content: center; font-size: 18px; line-height: 1; border: 1px solid var(--border); border-radius: 6px; background: var(--card); color: #333; cursor: pointer; transition: background .2s; }
    .btn-add-org:hover { background: #f5f5f5; }
    .btn { height: 32px; padding: 0 16px; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; transition: background .2s; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: #4096ff; }
    .btn-text { background: transparent; color: var(--primary); }
    .btn-text:hover { background: rgba(22, 119, 255, .08); }
    .btn-danger { background: #ff4d4f; color: #fff; }
    .btn-danger:hover { background: #ff7875; }
    .org-tree-wrap { flex: 1; overflow: auto; padding: 12px; }
    .org-tree { list-style: none; padding: 0; margin: 0; }
    .org-tree .tree-item { list-style: none; padding: 0; margin: 0; }
    .org-tree .tree-node { display: flex; align-items: center; width: 100%; padding: 6px 8px; font-size: 14px; color: #1f1f1f; cursor: pointer; background: transparent; min-height: 28px; }
    .org-tree .tree-node:hover { background: #f5f5f5; }
    .org-tree .tree-node.is-selected { background: #f5f5f5; color: #1f1f1f; }
    .org-tree .icon-arrow { width: 16px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: #1f1f1f; font-size: 10px; }
    .org-tree .icon-arrow.spacer { visibility: hidden; }
    .org-tree .icon-arrow.down svg { transform: rotate(0deg); }
    .org-tree .icon-arrow.right svg { transform: rotate(-90deg); }
    .org-tree .icon-arrow svg { width: 10px; height: 10px; transition: transform .15s; }
    .org-tree .node-title { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .org-tree .tree-children { list-style: none; padding-left: 24px; margin: 0; }
    .org-right { flex: 1; min-width: 0; background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); display: flex; flex-direction: column; overflow: hidden; }
    .org-right-head { padding: 16px 24px; border-bottom: 1px solid var(--border); font-size: 16px; font-weight: 600; }
    .org-right-body { flex: 1; overflow: auto; padding: 24px; }
    .org-detail-placeholder { color: var(--text2); font-size: 14px; text-align: center; padding: 48px 24px; }
    .org-info-section { margin-bottom: 24px; }
    .org-info-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; color: var(--text); }
    .org-info-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px 32px; font-size: 14px; }
    .org-info-item { display: flex; gap: 8px; }
    .org-info-label { color: var(--text2); min-width: 80px; }
    .org-info-value { color: var(--text); }
    .org-users-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 12px; }
    .org-users-title { font-size: 14px; font-weight: 600; }
    .org-users-actions { display: flex; gap: 8px; align-items: center; }
    .org-users-search { width: 200px; height: 32px; padding: 0 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; }
    .org-table { width: 100%; border-collapse: collapse; font-size: 14px; }
    .org-table th, .org-table td { padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--border); }
    .org-table th { background: #fafafa; color: var(--text2); font-weight: 500; }
    .org-table td { color: var(--text); }
    .modal-mask { position: fixed; inset: 0; background: rgba(0,0,0,.45); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .modal-mask.is-hidden { display: none; }
    .modal { background: var(--card); border-radius: var(--radius); box-shadow: 0 12px 48px rgba(0,0,0,.15); width: 480px; max-width: 90vw; }
    .modal-header { padding: 16px 24px; border-bottom: 1px solid var(--border); font-size: 16px; font-weight: 600; }
    .modal-body { padding: 24px; }
    .form-item { margin-bottom: 16px; }
    .form-item:last-child { margin-bottom: 0; }
    .form-item-inline { display: flex; align-items: center; gap: 8px; }
    .form-label { display: block; margin-bottom: 8px; font-size: 14px; color: var(--text); }
    .form-input, .form-select, .form-textarea { width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; }
    .form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--primary); }
    .form-textarea { min-height: 80px; resize: vertical; }
    .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }
    .btn-default { background: var(--card); border: 1px solid var(--border); color: var(--text); }
    .btn-default:hover { background: #fafafa; border-color: var(--primary); color: var(--primary); }
    .modal-lg { width: 960px; max-width: 92vw; }
    .picker-wrap { display: grid; grid-template-columns: 1fr 280px; gap: 16px; min-height: 520px; }
    .picker-left { display: flex; flex-direction: column; gap: 12px; }
    .picker-tabs { display: flex; gap: 12px; border-bottom: 1px solid var(--border); }
    .picker-tab { padding: 8px 12px; border-radius: 6px 6px 0 0; background: transparent; border: none; cursor: pointer; color: var(--text2); }
    .picker-tab.is-active { background: #e6f4ff; color: var(--primary); }
    .picker-search { width: 320px; height: 32px; padding: 0 12px; border: 1px solid var(--border); border-radius: 6px; }
    .picker-table { flex: 1; overflow: auto; border: 1px solid var(--border); border-radius: 8px; }
    .picker-right { border-left: 1px solid var(--border); padding-left: 16px; display: flex; flex-direction: column; }
    .picker-right-title { font-size: 14px; font-weight: 600; margin-bottom: 8px; }
    .selected-list { flex: 1; overflow: auto; display: flex; flex-direction: column; gap: 8px; }
    .selected-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; }
    .selected-item .remove { background: transparent; border: none; color: var(--text2); cursor: pointer; }
    .chips { display: flex; gap: 6px; flex-wrap: wrap; }
    .chip { padding: 2px 8px; border-radius: 12px; border: 1px solid var(--border); background: #fafafa; font-size: 12px; color: var(--text2); }
    .picker-expand-btn { width: 16px; height: 16px; border: 1px solid var(--border); border-radius: 2px; background: var(--card); color: var(--text2); display: inline-flex; align-items: center; justify-content: center; cursor: pointer; font-size: 12px; line-height: 1; padding: 0; }
    .picker-expand-btn:hover { border-color: var(--primary); color: var(--primary); }
    .picker-expand-btn.is-disabled { opacity: .45; cursor: default; }
    .picker-expand-btn.is-disabled:hover { border-color: var(--border); color: var(--text2); }
    .picker-expand-row td { padding: 0; }
    .picker-expand-wrap { padding: 12px 16px; background: #fafafa; border-top: 1px solid var(--border); }
    .picker-expand-wrap .org-table th, .picker-expand-wrap .org-table td { padding: 12px 16px; }
    .picker-subsection { margin-top: 12px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    .picker-subsection:first-child { margin-top: 0; }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="app-logo">平台管理系统</div>
      <nav class="top-nav-container"></nav>
    </header>
    <div class="app-body">
      <aside class="app-sider is-hidden" data-sider="base-control">
        <nav class="side-nav-container"></nav>
      </aside>
      <main id="app-main" class="app-content">
        <div class="org-page">
          <div class="org-left">
            <div class="org-left-title">组织架构</div>
            <div class="org-left-head">
              <div class="org-search-wrap">
                <input type="text" class="org-search" id="orgSearch" placeholder="搜索组织名称">
                <span class="org-search-icon"><svg viewBox="0 0 1024 1024" fill="currentColor"><path d="M945.066 901.333L755.2 711.467c55.466-64 89.6-149.333 89.6-241.067 0-204.8-168.533-373.333-373.333-373.333S98.133 265.6 98.133 470.4 266.667 843.733 471.467 843.733c91.734 0 177.067-34.134 241.067-89.6l189.866 189.866c6.4 6.4 14.934 8.534 23.467 8.534s17.067-2.134 23.467-8.534c8.533-12.8 8.533-34.134-2.134-46.934zM471.467 778.667C298.667 778.667 160 640 160 470.4s138.667-308.267 308.267-308.267 308.267 138.667 308.267 308.267S644.267 778.667 471.467 778.667z"/></svg></span>
              </div>
              <button type="button" class="btn-add-org" id="btnAddOrg" title="新增组织">+</button>
            </div>
            <div class="org-tree-wrap">
              <ul class="org-tree" id="orgTree"></ul>
            </div>
          </div>
          <div class="org-right">
            <div class="org-right-head">组织详情</div>
            <div class="org-right-body" id="orgRightBody">
              <div class="org-detail-placeholder" id="orgPlaceholder">请在左侧选择组织</div>
              <div id="orgDetail" class="org-detail-content" style="display:none;">
                <div class="org-info-section">
                  <div class="org-info-title">基本信息</div>
                  <div class="org-info-grid">
                    <div class="org-info-item"><span class="org-info-label">上级组织</span><span class="org-info-value" id="detailParent">-</span></div>
                    <div class="org-info-item"><span class="org-info-label">组织ID</span><span class="org-info-value" id="detailId">-</span></div>
                    <div class="org-info-item"><span class="org-info-label">创建人</span><span class="org-info-value" id="detailCreator">-</span></div>
                    <div class="org-info-item"><span class="org-info-label">创建时间</span><span class="org-info-value" id="detailTime">-</span></div>
                    <div class="org-info-item" style="grid-column: 1 / -1;"><span class="org-info-label">组织描述</span><span class="org-info-value" id="detailDesc">-</span></div>
                  </div>
                </div>
                <div class="org-info-section">
                  <div class="org-users-head">
                    <span class="org-users-title">组织用户</span>
                    <div class="org-users-actions">
                      <input type="text" class="org-users-search" id="userSearch" placeholder="按用户名搜索">
                      <button type="button" class="btn btn-primary" id="btnAddUser">新增用户</button>
                    </div>
                  </div>
                  <div style="overflow-x: auto;">
                    <table class="org-table">
                      <thead>
                        <tr>
                          <th>账号</th>
                          <th>姓名</th>
                          <th>角色</th>
                          <th>描述</th>
                          <th>创建人</th>
                          <th style="width:80px">操作</th>
                        </tr>
                      </thead>
                      <tbody id="userTableBody"></tbody>
                    </table>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>
  <div class="modal-mask is-hidden" id="addOrgModal">
    <div class="modal">
      <div class="modal-header">新增组织</div>
      <div class="modal-body">
        <div class="form-item">
          <label class="form-label">组织名称</label>
          <input type="text" class="form-input" id="modalOrgName" placeholder="请输入组织名称">
        </div>
        <div class="form-item">
          <label class="form-label">上级组织</label>
          <select class="form-select" id="modalParent">
            <option value="">无（根组织）</option>
          </select>
        </div>
        <div class="form-item">
          <label class="form-label">描述</label>
          <textarea class="form-textarea" id="modalDesc" placeholder="请输入描述"></textarea>
        </div>
        <div class="form-item">
          <label class="form-label">选择资源</label>
          <div class="form-item-inline">
            <div id="resSummary" class="form-input" style="flex:1; display:flex; align-items:center; min-height:32px;">
              <span id="resSummaryText" style="color: var(--text2);">未选择</span>
            </div>
            <button type="button" class="btn btn-default" id="btnPickRes">选择</button>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-default" id="modalCancel">取消</button>
        <button type="button" class="btn btn-primary" id="modalConfirm">确定</button>
      </div>
    </div>
  </div>
  <div class="modal-mask is-hidden" id="resPickerModal">
    <div class="modal modal-lg">
      <div class="modal-header">选择资源</div>
      <div class="modal-body">
        <div class="picker-wrap">
          <div class="picker-left">
            <div class="picker-tabs">
              <button type="button" class="picker-tab is-active" data-tab="pool">资源池</button>
              <button type="button" class="picker-tab" data-tab="volume">存储卷</button>
            </div>
            <div style="display:flex;justify-content:space-between;align-items:center;">
              <input type="text" class="picker-search" id="pickerSearch" placeholder="搜索名称">
              <div id="pickerCount" style="font-size:12px;color:var(--text2);"></div>
            </div>
            <div class="picker-table">
              <table class="org-table">
                <thead id="pickerThead"></thead>
                <tbody id="pickerTbody"></tbody>
              </table>
            </div>
            <div style="display:flex;justify-content:flex-end;gap:8px;align-items:center;margin-top:8px;">
              <button type="button" class="btn btn-default" id="pickerPrev">上一页</button>
              <span id="pickerPager" style="font-size:12px;color:var(--text2);"></span>
              <button type="button" class="btn btn-default" id="pickerNext">下一页</button>
            </div>
          </div>
          <div class="picker-right">
            <div class="picker-right-title">已选</div>
            <div class="selected-list" id="selectedList"></div>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-default" id="pickerCancel">取消</button>
        <button type="button" class="btn btn-primary" id="pickerOk">确定</button>
      </div>
    </div>
  </div>
  <script src="./common.js"></script>
  <script>
    initLayout();

    (function () {
      var orgData = [
        { id: 'org-1', name: '总公司', parentId: '', desc: '根组织', creator: 'admin', createTime: '2024-01-01 10:00:00', children: [
          { id: 'org-2', name: '技术研发部', parentId: 'org-1', desc: '技术研发', creator: 'admin', createTime: '2024-01-02 09:00:00', children: [
            { id: 'org-4', name: '前端组', parentId: 'org-2', desc: '前端开发', creator: 'admin', createTime: '2024-01-03 10:00:00', children: [
              { id: 'org-7', name: 'UI 小组', parentId: 'org-4', desc: 'UI 设计', creator: 'admin', createTime: '2024-01-05 10:00:00', children: [] }
            ]},
            { id: 'org-5', name: '后端组', parentId: 'org-2', desc: '后端开发', creator: 'admin', createTime: '2024-01-03 11:00:00', children: [] }
          ]},
          { id: 'org-3', name: '市场部', parentId: 'org-1', desc: '市场营销', creator: 'admin', createTime: '2024-01-02 10:00:00', children: [
            { id: 'org-6', name: '品牌推广组', parentId: 'org-3', desc: '品牌推广', creator: 'admin', createTime: '2024-01-04 10:00:00', children: [] }
          ]}
        ]}
      ];

      var userDataByOrg = {
        'org-1': [
          { account: 'admin', name: '管理员', role: '超级管理员', desc: '系统管理员', creator: 'system', id: 'u1' },
          { account: 'ceo', name: '张总', role: '总裁', desc: '公司负责人', creator: 'admin', id: 'u2' }
        ],
        'org-2': [
          { account: 'tech1', name: '李工', role: '技术经理', desc: '研发负责人', creator: 'admin', id: 'u3' },
          { account: 'dev1', name: '王开发', role: '开发工程师', desc: '后端开发', creator: 'tech1', id: 'u4' }
        ],
        'org-3': [
          { account: 'mkt1', name: '赵经理', role: '市场经理', desc: '市场负责人', creator: 'admin', id: 'u5' }
        ],
        'org-4': [
          { account: 'fe1', name: '孙前端', role: '前端工程师', desc: '前端开发', creator: 'tech1', id: 'u6' }
        ],
        'org-5': [],
        'org-6': [],
        'org-7': []
      };

      var orgIdToName = {};
      function buildOrgMap(nodes, parentName) {
        nodes.forEach(function (n) {
          orgIdToName[n.id] = n.name;
          if (n.children && n.children.length) buildOrgMap(n.children, n.name);
        });
      }
      buildOrgMap(orgData, '');

      function flattenTree(nodes, list) {
        list = list || [];
        nodes.forEach(function (n) {
          list.push(n);
          if (n.children && n.children.length) flattenTree(n.children, list);
        });
        return list;
      }

      function filterTree(nodes, keyword) {
        if (!keyword || !keyword.trim()) return nodes;
        var kw = keyword.trim().toLowerCase();
        function match(node) {
          if (node.name.toLowerCase().indexOf(kw) !== -1) return true;
          if (node.children && node.children.length) {
            node.children = filterTree(node.children, keyword);
            return node.children.length > 0;
          }
          return false;
        }
        return nodes.filter(match);
      }

      function getChildCount(node) {
        return (node.children && node.children.length) ? node.children.length : 0;
      }
      var expandedIds = {};
      function renderTree(nodes, container, level, selectedId) {
        level = level || 0;
        container.innerHTML = '';
        nodes.forEach(function (node) {
          var li = document.createElement('li');
          li.className = 'tree-item';
          li.dataset.id = node.id;
          var hasChildren = node.children && node.children.length > 0;
          var expanded = expandedIds[node.id] !== false;
          var count = getChildCount(node);
          var nodeLabel = node.name + '(' + count + ')';
          var nodeDiv = document.createElement('div');
          nodeDiv.className = 'tree-node' + (selectedId === node.id ? ' is-selected' : '');
          var icon = document.createElement('i');
          icon.className = 'icon-arrow';
          if (hasChildren) {
            icon.classList.add(expanded ? 'down' : 'right');
            icon.innerHTML = '<svg viewBox="0 0 1024 1024" fill="currentColor"><path d="M128 384l384 384 384-384z"/></svg>';
            icon.style.cursor = 'pointer';
          } else {
            icon.classList.add('spacer');
            icon.innerHTML = '<svg viewBox="0 0 1024 1024" fill="currentColor"><path d="M128 384l384 384 384-384z"/></svg>';
          }
          var title = document.createElement('span');
          title.className = 'node-title';
          title.textContent = nodeLabel;
          title.title = nodeLabel;
          nodeDiv.appendChild(icon);
          nodeDiv.appendChild(title);
          li.appendChild(nodeDiv);
          var ul = null;
          if (hasChildren) {
            ul = document.createElement('ul');
            ul.className = 'tree-children';
            ul.style.display = expanded ? '' : 'none';
            renderTree(node.children, ul, level + 1, selectedId);
            li.appendChild(ul);
          }
          icon.addEventListener('click', function (e) {
            e.stopPropagation();
            if (hasChildren && ul) {
              var newExpanded = !expanded;
              expandedIds[node.id] = newExpanded;
              ul.style.display = newExpanded ? '' : 'none';
              icon.classList.toggle('down', newExpanded);
              icon.classList.toggle('right', !newExpanded);
            }
          });
          nodeDiv.addEventListener('click', function (e) {
            if (e.target === icon || icon.contains(e.target)) return;
            selectOrg(node.id);
          });
          container.appendChild(li);
        });
      }

      var selectedOrgId = null;
      var allOrgs = flattenTree(orgData);

      function selectOrg(id) {
        selectedOrgId = id;
        var keyword = document.getElementById('orgSearch').value;
        var filtered = filterTree(JSON.parse(JSON.stringify(orgData)), keyword);
        renderTree(filtered, document.getElementById('orgTree'), 0, id);
        showOrgDetail(id);
      }

      function showOrgDetail(id) {
        var org = allOrgs.find(function (o) { return o.id === id; });
        if (!org) return;
        document.getElementById('orgPlaceholder').style.display = 'none';
        document.getElementById('orgDetail').style.display = 'block';
        document.getElementById('detailParent').textContent = org.parentId ? (orgIdToName[org.parentId] || '-') : '无';
        document.getElementById('detailId').textContent = org.id;
        document.getElementById('detailCreator').textContent = org.creator || '-';
        document.getElementById('detailTime').textContent = org.createTime || '-';
        document.getElementById('detailDesc').textContent = org.desc || '-';
        renderUsers(id);
      }

      function renderUsers(orgId) {
        var users = (userDataByOrg[orgId] || []).slice();
        var keyword = (document.getElementById('userSearch').value || '').trim().toLowerCase();
        if (keyword) {
          users = users.filter(function (u) {
            return (u.account || '').toLowerCase().indexOf(keyword) !== -1 ||
                   (u.name || '').toLowerCase().indexOf(keyword) !== -1;
          });
        }
        var tbody = document.getElementById('userTableBody');
        tbody.innerHTML = users.map(function (u) {
          return '<tr data-id="' + u.id + '">' +
            '<td>' + (u.account || '-') + '</td>' +
            '<td>' + (u.name || '-') + '</td>' +
            '<td>' + (u.role || '-') + '</td>' +
            '<td>' + (u.desc || '-') + '</td>' +
            '<td>' + (u.creator || '-') + '</td>' +
            '<td><button type="button" class="btn btn-text btn-danger" data-action="delete" data-id="' + u.id + '">删除</button></td>' +
            '</tr>';
        }).join('');
        tbody.querySelectorAll('[data-action="delete"]').forEach(function (btn) {
          btn.addEventListener('click', function () {
            var uid = btn.dataset.id;
            if (userDataByOrg[orgId]) {
              userDataByOrg[orgId] = userDataByOrg[orgId].filter(function (u) { return u.id !== uid; });
              renderUsers(orgId);
            }
          });
        });
      }

      document.getElementById('orgSearch').addEventListener('input', function () {
        var keyword = this.value;
        var filtered = filterTree(JSON.parse(JSON.stringify(orgData)), keyword);
        renderTree(filtered, document.getElementById('orgTree'), 0, selectedOrgId);
      });

      document.getElementById('btnAddOrg').addEventListener('click', function () {
        var sel = document.getElementById('modalParent');
        sel.innerHTML = '<option value="">无（根组织）</option>';
        allOrgs.forEach(function (o) {
          var opt = document.createElement('option');
          opt.value = o.id;
          opt.textContent = o.name;
          if (selectedOrgId === o.id) opt.selected = true;
          sel.appendChild(opt);
        });
        document.getElementById('modalOrgName').value = '';
        document.getElementById('modalDesc').value = '';
        document.getElementById('addOrgModal').classList.remove('is-hidden');
      });

      document.getElementById('modalCancel').addEventListener('click', function () {
        document.getElementById('addOrgModal').classList.add('is-hidden');
      });

      document.getElementById('modalConfirm').addEventListener('click', function () {
        var name = document.getElementById('modalOrgName').value.trim();
        if (!name) { alert('请输入组织名称'); return; }
        var parentId = document.getElementById('modalParent').value;
        var desc = document.getElementById('modalDesc').value.trim();
        var newId = 'org-' + Date.now();
        var newNode = { id: newId, name: name, parentId: parentId, desc: desc, creator: 'admin', createTime: new Date().toLocaleString(), children: [] };
        orgIdToName[newId] = name;
        allOrgs.push(newNode);
        if (parentId) {
          function addChild(nodes) {
            for (var i = 0; i < nodes.length; i++) {
              if (nodes[i].id === parentId) {
                nodes[i].children = nodes[i].children || [];
                nodes[i].children.push(newNode);
                return true;
              }
              if (nodes[i].children && addChild(nodes[i].children)) return true;
            }
            return false;
          }
          addChild(orgData);
        } else {
          orgData.push(newNode);
        }
        userDataByOrg[newId] = [];
        document.getElementById('addOrgModal').classList.add('is-hidden');
        document.getElementById('orgSearch').value = '';
        selectOrg(newId);
      });

      document.getElementById('userSearch').addEventListener('input', function () {
        if (selectedOrgId) renderUsers(selectedOrgId);
      });

      document.getElementById('btnAddUser').addEventListener('click', function () {
        if (!selectedOrgId) {
          alert('请先在左侧选择组织');
          return;
        }
        window.location.href = 'user-create.html?orgId=' + encodeURIComponent(selectedOrgId);
      });

      selectOrg('org-1');

      var resPools = [
        { id: 'p1', name: '齐鲁医院资源池', desc: '-', policy: '组织本级所有项目和新增项目', cpu: '251/256', mem: '1007/1024', gpu: '0/2', children: [
          { id: 'c1', name: 'shsa', desc: '-', cpu: '-', mem: '-', gpu: '-' },
          { id: 'c2', name: 'test111', desc: '-', cpu: '-', mem: '-', gpu: '-' },
          { id: 'c3', name: 'test11', desc: '-', cpu: '-', mem: '-', gpu: '-' },
          { id: 'c4', name: 'public', desc: '-', cpu: '-', mem: '-', gpu: '-' },
          { id: 'c5', name: 'UA资源池', desc: '-', cpu: '-', mem: '-', gpu: '-' },
          { id: 'c6', name: 'AI产线无GPU资源池', desc: '-', cpu: '-', mem: '-', gpu: '-' }
        ] },
        { id: 'p2', name: 'UAI资源池', desc: '-', policy: '组织及下级组织的所有项目和新增项目', cpu: '120/256', mem: '600/1024', gpu: '1/4', children: [] },
        { id: 'p3', name: 'public', desc: '-', policy: '组织本级所有项目和新增项目', cpu: '80/200', mem: '300/512', gpu: '0/0', children: [] }
      ];
      var resVolumes = [
        { id: 'v1', name: '省区大客户服务组存储卷', cap: '10.00GB/10.00GB' },
        { id: 'v2', name: 'Purchase', cap: '94.81GB/100.00GB' },
        { id: 'v3', name: 'UAI默认存储卷', cap: '37.85GB/100.00GB' }
      ];
      var resSelected = { pool: {}, volume: {} };
      var resCommitted = { pool: {}, volume: {} };
      var poolExpanded = {};
      var currentTab = 'pool';
      var pageIndex = 1;
      var pageSize = 10;

      function normalizePoolSelection(map) {
        var next = {};
        Object.keys(map || {}).forEach(function (id) {
          if (id.indexOf(':') !== -1) return;
          if (resPools.some(function (p) { return p.id === id; })) next[id] = true;
        });
        return next;
      }

      function openResPicker() {
        currentTab = 'pool';
        pageIndex = 1;
        resSelected.pool = normalizePoolSelection(resCommitted.pool);
        resSelected.volume = Object.assign({}, resCommitted.volume);
        poolExpanded = {};
        document.getElementById('pickerSearch').value = '';
        switchTab('pool');
        document.getElementById('resPickerModal').classList.remove('is-hidden');
      }
      function closeResPicker() {
        document.getElementById('resPickerModal').classList.add('is-hidden');
      }
      function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.picker-tab').forEach(function (el) {
          el.classList.toggle('is-active', el.dataset.tab === tab);
        });
        pageIndex = 1;
        renderPickerTable();
        renderSelectedList();
      }
      function getActiveData() {
        var kw = (document.getElementById('pickerSearch').value || '').trim().toLowerCase();
        var src = currentTab === 'pool' ? resPools : resVolumes;
        if (!kw) return src.slice();
        if (currentTab !== 'pool') {
          return src.filter(function (x) { return (x.name || '').toLowerCase().indexOf(kw) !== -1; });
        }
        return src.filter(function (x) { return (x.name || '').toLowerCase().indexOf(kw) !== -1; });
      }

      function getPoolLabelById(id) {
        if (id.indexOf(':') === -1) {
          var p = resPools.find(function (x) { return x.id === id; });
          return p ? p.name : id;
        }
        var parts = id.split(':');
        var pid = parts[0];
        var cid = parts[1];
        var p2 = resPools.find(function (x) { return x.id === pid; });
        if (!p2) return id;
        var c2 = (p2.children || []).find(function (x) { return x.id === cid; });
        if (!c2) return p2.name + ' / ' + cid;
        return p2.name + ' / ' + c2.name;
      }

      function renderPickerTable() {
        var thead = document.getElementById('pickerThead');
        var tbody = document.getElementById('pickerTbody');
        var rows = getActiveData();
        var total = rows.length;
        var start = (pageIndex - 1) * pageSize;
        var pageRows = rows.slice(start, start + pageSize);
        if (currentTab === 'pool') {
          thead.innerHTML = '<tr><th style="width:36px;"></th><th style="width:48px;"></th><th>资源池名称</th><th>资源池描述</th><th>绑定策略</th></tr>';
          tbody.innerHTML = pageRows.map(function (r) {
            var hasChildren = !!(r.children && r.children.length);
            var expanded = !!poolExpanded[r.id];
            var btnClass = 'picker-expand-btn' + (hasChildren ? '' : ' is-disabled');
            var btnText = expanded ? '−' : '+';
            var checked = !!resSelected.pool[r.id];
            var policyText = (r.policy || '-');
            var baseRow = '<tr data-id="' + r.id + '" data-kind="pool-parent">' +
              '<td>' + (hasChildren ? '<button type="button" class="' + btnClass + '" data-action="toggle-parent" data-id="' + r.id + '">' + btnText + '</button>' : '<button type="button" class="' + btnClass + '" tabindex="-1">+</button>') + '</td>' +
              '<td><input type="checkbox" class="picker-ck" data-type="pool" data-id="' + r.id + '" ' + (checked ? 'checked' : '') + '></td>' +
              '<td>' + (r.name || '-') + '</td>' +
              '<td>' + (r.desc || '-') + '</td>' +
              '<td>' + policyText + '</td>' +
              '</tr>';
            if (!hasChildren || !expanded) return baseRow;
            var metricTable = '<div class="picker-subsection"><table class="org-table" style="margin:0;">' +
              '<thead><tr><th>名称</th><th>CPU(核)</th><th>内存(GiB)</th><th>GPU(卡数)</th></tr></thead>' +
              '<tbody><tr><td>资源池剩余量/总量</td><td>' + (r.cpu || '-') + '</td><td>' + (r.mem || '-') + '</td><td>' + (r.gpu || '-') + '</td></tr></tbody>' +
              '</table></div>';
            var expandRow = '<tr class="picker-expand-row" data-parent="' + r.id + '"><td colspan="5">' +
              '<div class="picker-expand-wrap">' + metricTable + '</div>' +
              '</td></tr>';
            return baseRow + expandRow;
          }).join('');
        } else {
          thead.innerHTML = '<tr><th style="width:48px;"></th><th>名称</th><th>存储容量（剩余/总）</th></tr>';
          tbody.innerHTML = pageRows.map(function (r) {
            var checked = !!resSelected.volume[r.id];
            return '<tr data-id="' + r.id + '"><td><input type="checkbox" class="picker-ck" data-type="volume" data-id="' + r.id + '" ' + (checked ? 'checked' : '') + '></td><td>' + r.name + '</td><td>' + r.cap + '</td></tr>';
          }).join('');
        }
        document.getElementById('pickerCount').textContent = '共 ' + total + ' 条';
        var totalPages = Math.max(1, Math.ceil(total / pageSize));
        document.getElementById('pickerPager').textContent = pageIndex + ' / ' + totalPages;
        tbody.querySelectorAll('[data-action="toggle-parent"]').forEach(function (btn) {
          btn.addEventListener('click', function () {
            var id = btn.dataset.id;
            poolExpanded[id] = !poolExpanded[id];
            renderPickerTable();
            renderSelectedList();
          });
        });
        tbody.querySelectorAll('.picker-ck').forEach(function (ck) {
          ck.addEventListener('change', function () {
            var id = ck.dataset.id;
            var type = ck.dataset.type || (currentTab === 'pool' ? 'pool' : 'volume');
            toggleSelect(type, id, ck.checked);
          });
        });
      }
      function toggleSelect(type, id, checked) {
        if (type === 'pool') {
          if (checked) resSelected.pool[id] = true; else delete resSelected.pool[id];
        } else {
          if (checked) resSelected.volume[id] = true; else delete resSelected.volume[id];
        }
        renderSelectedList();
        if (type === 'pool') renderPickerTable();
      }
      function renderSelectedList() {
        var box = document.getElementById('selectedList');
        var items = [];
        Object.keys(resSelected.pool).forEach(function (id) {
          items.push({ id: id, type: 'pool', name: getPoolLabelById(id) });
        });
        Object.keys(resSelected.volume).forEach(function (id) {
          var r = resVolumes.find(function (x) { return x.id === id; });
          if (r) items.push({ id: id, type: 'volume', name: r.name });
        });
        box.innerHTML = items.map(function (it) {
          return '<div class="selected-item" data-type="' + it.type + '" data-id="' + it.id + '"><span>' + it.name + '</span><button class="remove" type="button">×</button></div>';
        }).join('') || '<div style="color:var(--text2);font-size:13px;">未选择</div>';
        box.querySelectorAll('.selected-item .remove').forEach(function (btn) {
          btn.addEventListener('click', function () {
            var wrap = btn.closest('.selected-item');
            var id = wrap.dataset.id;
            var type = wrap.dataset.type;
            if (type === 'pool') delete resSelected.pool[id]; else delete resSelected.volume[id];
            renderPickerTable();
            renderSelectedList();
          });
        });
      }
      function updateResSummary() {
        var chips = [];
        Object.keys(resCommitted.pool).forEach(function (id) {
          chips.push({ label: getPoolLabelById(id) });
        });
        Object.keys(resCommitted.volume).forEach(function (id) {
          var r = resVolumes.find(function (x) { return x.id === id; });
          if (r) chips.push({ label: r.name });
        });
        var wrap = document.getElementById('resSummary');
        var text = document.getElementById('resSummaryText');
        if (chips.length === 0) {
          wrap.classList.remove('chips');
          wrap.innerHTML = '<span id="resSummaryText" style="color: var(--text2);">未选择</span>';
        } else {
          wrap.classList.add('chips');
          wrap.innerHTML = chips.map(function (c) { return '<span class="chip">' + c.label + '</span>'; }).join('');
        }
      }
      document.getElementById('btnPickRes').addEventListener('click', openResPicker);
      document.querySelectorAll('.picker-tab').forEach(function (el) {
        el.addEventListener('click', function () { switchTab(el.dataset.tab); });
      });
      document.getElementById('pickerSearch').addEventListener('input', function () {
        pageIndex = 1;
        renderPickerTable();
      });
      document.getElementById('pickerPrev').addEventListener('click', function () {
        var total = getActiveData().length;
        var totalPages = Math.max(1, Math.ceil(total / pageSize));
        pageIndex = Math.max(1, pageIndex - 1);
        document.getElementById('pickerPager').textContent = pageIndex + ' / ' + totalPages;
        renderPickerTable();
      });
      document.getElementById('pickerNext').addEventListener('click', function () {
        var total = getActiveData().length;
        var totalPages = Math.max(1, Math.ceil(total / pageSize));
        pageIndex = Math.min(totalPages, pageIndex + 1);
        document.getElementById('pickerPager').textContent = pageIndex + ' / ' + totalPages;
        renderPickerTable();
      });
      document.getElementById('pickerCancel').addEventListener('click', function () {
        closeResPicker();
      });
      document.getElementById('pickerOk').addEventListener('click', function () {
        resCommitted.pool = normalizePoolSelection(resSelected.pool);
        resCommitted.volume = Object.assign({}, resSelected.volume);
        updateResSummary();
        closeResPicker();
      });
    })();
  </script>
</body>
</html>
