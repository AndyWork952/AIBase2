<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>角色管理 - 平台管理系统</title>
  <style>
    :root {
      --primary: #1677ff;
      --bg: #f5f7fb;
      --card: #fff;
      --border: rgba(5,5,5,.10);
      --text: rgba(0,0,0,.88);
      --text2: rgba(0,0,0,.65);
      --radius: 10px;
      --shadow: 0 6px 20px rgba(0,0,0,.06);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .app-shell { min-height: 100vh; display: flex; flex-direction: column; }
    .app-header { height: 64px; background: var(--card); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 24px; gap: 48px; }
    .app-logo { font-size: 18px; font-weight: 600; color: var(--primary); white-space: nowrap; }
    .top-nav-container { display: flex; gap: 4px; flex: 1; }
    .top-nav-item { padding: 8px 16px; text-decoration: none; color: var(--text); border-radius: 6px; font-size: 14px; transition: background .2s, color .2s; position: relative; }
    .top-nav-item:hover { background: rgba(22, 119, 255, .08); color: var(--primary); }
    .top-nav-item.is-active { color: var(--primary); font-weight: 500; background: #e6f4ff; }
    .top-nav-item.is-active::after { content: ''; position: absolute; bottom: 0; left: 16px; right: 16px; height: 2px; background: var(--primary); border-radius: 1px; }
    .app-body { flex: 1; display: flex; min-height: 0; }
    .app-sider { width: 220px; background: var(--card); border-right: 1px solid var(--border); padding: 16px 0; flex-shrink: 0; }
    .app-sider.is-hidden { width: 0; min-width: 0; opacity: 0; overflow: hidden; padding: 0; border-right: none; }
    .side-nav-container { display: flex; flex-direction: column; gap: 2px; }
    .side-nav-item { padding: 10px 20px; text-decoration: none; color: var(--text2); font-size: 14px; border-radius: 6px; border-left: 3px solid transparent; transition: all .2s; }
    .side-nav-item:hover { color: var(--primary); background: rgba(22, 119, 255, .06); }
    .side-nav-item.is-active { color: var(--primary); background: #e6f4ff; font-weight: 500; border-left-color: var(--primary); }
    .app-content { flex: 1; padding: 24px; overflow: auto; display: flex; flex-direction: column; }
    .role-page { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 24px; flex: 1; display: flex; flex-direction: column; min-height: 0; }
    .role-page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
    .role-page-title { font-size: 20px; font-weight: 600; margin: 0; color: var(--text); }
    .role-filters { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .role-search { width: 220px; height: 32px; padding: 0 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; }
    .role-search:focus { outline: none; border-color: var(--primary); }
    .role-org-filter { min-width: 180px; height: 32px; padding: 0 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; }
    .role-org-filter:focus { outline: none; border-color: var(--primary); }
    .btn { height: 32px; padding: 0 16px; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; transition: background .2s; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: #4096ff; }
    .btn-text { background: transparent; color: var(--primary); }
    .btn-text:hover { background: rgba(22, 119, 255, .08); }
    .btn-danger { background: transparent; color: #ff4d4f; }
    .btn-danger:hover { background: rgba(255, 77, 79, .08); }
    .btn-disabled { opacity: 0.6; cursor: not-allowed; pointer-events: none; }
    .role-table-wrap { flex: 1; overflow: auto; }
    .role-table { width: 100%; border-collapse: collapse; font-size: 14px; }
    .role-table th, .role-table td { padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--border); }
    .role-table th { background: #fafafa; color: var(--text2); font-weight: 500; white-space: nowrap; }
    .role-table td { color: var(--text); }
    .role-table .col-ops { white-space: nowrap; }
    .role-table .col-ops .btn { padding: 0 8px; margin-right: 8px; }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="app-logo">平台管理系统</div>
      <nav class="top-nav-container"></nav>
    </header>
    <div class="app-body">
      <aside class="app-sider is-hidden" data-sider="base-control">
        <nav class="side-nav-container"></nav>
      </aside>
      <main id="app-main" class="app-content">
        <div class="role-page">
          <div class="role-page-header">
            <h1 class="role-page-title">角色管理</h1>
            <div class="role-filters">
              <input type="text" class="role-search" id="roleSearch" placeholder="按角色名称搜索">
              <select class="role-org-filter" id="roleOrgFilter">
                <option value="">全部组织</option>
              </select>
              <button type="button" class="btn btn-default" id="btnRefresh">刷新</button>
              <a href="role-create.html" class="btn btn-primary">新增角色</a>
            </div>
          </div>
          <div class="role-table-wrap">
            <table class="role-table">
              <thead>
                <tr>
                  <th>角色名称</th>
                  <th>角色层级</th>
                  <th>角色类型</th>
                  <th>描述</th>
                  <th class="col-ops">操作</th>
                </tr>
              </thead>
              <tbody id="roleTableBody"></tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
  </div>
  <script src="./common.js"></script>
  <script>
    initLayout();

    (function () {
      var orgData = [
        { id: 'org-1', name: '总公司', children: [
          { id: 'org-2', name: '技术研发部', children: [
            { id: 'org-4', name: '前端组', children: [
              { id: 'org-7', name: 'UI 小组', children: [] }
            ]},
            { id: 'org-5', name: '后端组', children: [] }
          ]},
          { id: 'org-3', name: '市场部', children: [
            { id: 'org-6', name: '品牌推广组', children: [] }
          ]}
        ]}
      ];

      function flattenOrgWithDepth(nodes, list, depth) {
        list = list || [];
        depth = depth || 0;
        nodes.forEach(function (n) {
          list.push({ id: n.id, name: n.name, depth: depth });
          if (n.children && n.children.length) flattenOrgWithDepth(n.children, list, depth + 1);
        });
        return list;
      }
      var orgListFlat = flattenOrgWithDepth(orgData);
      var indentChar = '\u3000\u3000';

      function renderOrgOptions(selectEl, firstText) {
        firstText = firstText || '全部组织';
        selectEl.innerHTML = '<option value="">' + firstText + '</option>';
        orgListFlat.forEach(function (o) {
          var opt = document.createElement('option');
          opt.value = o.id;
          opt.textContent = (indentChar.repeat(o.depth)) + o.name;
          selectEl.appendChild(opt);
        });
      }

      var workspaceList = [
        { id: 'ws1', name: '研发工作空间' },
        { id: 'ws2', name: '产品工作空间' },
        { id: 'ws3', name: '市场工作空间' }
      ];

      var defaultRoleList = [
        { id: 'r1', name: '租户管理员', level: '平台角色', type: '系统默认', desc: '拥有系统最高权限', creator: 'system' },
        { id: 'r2', name: '组织管理员', level: '平台角色', type: '系统默认', desc: '管理组织内的用户与资源', creator: 'system' },
        { id: 'r3', name: '组织用户', level: '平台角色', type: '系统默认', desc: '组织内普通用户', creator: 'system' },
        { id: 'r4', name: '空间管理员', level: '开发角色', type: '系统默认', desc: '管理工作空间内的资源', creator: 'system' },
        { id: 'r5', name: '空间成员', level: '开发角色', type: '系统默认', desc: '工作空间普通成员', creator: 'system' },
        { id: 'r6', name: '项目经理', level: '应用角色', type: '自定义', desc: '负责项目整体规划与协调', creator: 'admin' },
        { id: 'r7', name: '开发工程师', level: '开发角色', type: '自定义', desc: '参与项目开发工作', creator: 'admin', workspaceId: 'ws1' }
      ];
      var roleList = JSON.parse(localStorage.getItem('roleList') || 'null');
      if (!roleList || roleList.length === 0) {
        roleList = JSON.parse(JSON.stringify(defaultRoleList));
        localStorage.setItem('roleList', JSON.stringify(roleList));
      }

      renderOrgOptions(document.getElementById('roleOrgFilter'), '全部组织');

      function filterRoles() {
        var keyword = (document.getElementById('roleSearch').value || '').trim().toLowerCase();
        var orgId = document.getElementById('roleOrgFilter').value;
        if (!keyword && !orgId) return roleList;
        return roleList.filter(function (r) {
          var matchSearch = !keyword || (r.name || '').toLowerCase().indexOf(keyword) !== -1;
          // 仅当角色绑定了 orgId 时才按组织过滤；未绑定组织的角色在任何组织下都可见
          var matchOrg = !orgId || !r.orgId || r.orgId === orgId;
          return matchSearch && matchOrg;
        });
      }

      function renderTable() {
        var list = filterRoles();
        var tbody = document.getElementById('roleTableBody');
        tbody.innerHTML = list.map(function (r) {
          var ops = r.type === '系统默认' ? '-' : '<a href="role-edit.html?id=' + encodeURIComponent(r.id) + '" class="btn btn-text">编辑</a><button type="button" class="btn btn-danger btn-delete" data-id="' + r.id + '">删除</button>';
          return '<tr data-id="' + r.id + '">' +
            '<td>' + (r.name || '-') + '</td>' +
            '<td>' + (r.level || '-') + '</td>' +
            '<td>' + (r.type || '-') + '</td>' +
            '<td>' + (r.desc || '-') + '</td>' +
            '<td class="col-ops">' + ops + '</td></tr>';
        }).join('');
        tbody.querySelectorAll('.btn-delete').forEach(function (btn) {
          btn.addEventListener('click', function () {
            var r = roleList.find(function (x) { return x.id === btn.dataset.id; });
            if (!r) return;
            if (r.type === '系统默认') {
              alert('系统默认角色不允许删除');
              return;
            }
            if (confirm('确定要删除角色「' + r.name + '」吗？')) {
              roleList = roleList.filter(function (x) { return x.id !== btn.dataset.id; });
              localStorage.setItem('roleList', JSON.stringify(roleList));
              renderTable();
            }
          });
        });
      }

      document.getElementById('roleSearch').addEventListener('input', renderTable);
      document.getElementById('roleSearch').addEventListener('keyup', renderTable);
      document.getElementById('roleOrgFilter').addEventListener('change', renderTable);

      document.getElementById('btnRefresh').addEventListener('click', function () {
        roleList = JSON.parse(localStorage.getItem('roleList') || 'null');
        if (!roleList || roleList.length === 0) {
          roleList = JSON.parse(JSON.stringify(defaultRoleList));
          localStorage.setItem('roleList', JSON.stringify(roleList));
        }
        renderTable();
      });

      renderTable();
    })();
  </script>
</body>
</html>
