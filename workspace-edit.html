<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>编辑工作空间 - 平台管理系统</title>
  <style>
    :root {
      --primary: #1677ff;
      --bg: #f5f7fb;
      --card: #fff;
      --border: rgba(5,5,5,.10);
      --text: rgba(0,0,0,.88);
      --text2: rgba(0,0,0,.65);
      --radius: 10px;
      --shadow: 0 6px 20px rgba(0,0,0,.06);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .app-shell { min-height: 100vh; display: flex; flex-direction: column; }
    .app-header { height: 64px; background: var(--card); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 24px; gap: 48px; }
    .app-logo { font-size: 18px; font-weight: 600; color: var(--primary); white-space: nowrap; }
    .top-nav-container { display: flex; gap: 4px; flex: 1; }
    .top-nav-item { padding: 8px 16px; text-decoration: none; color: var(--text); border-radius: 6px; font-size: 14px; transition: background .2s, color .2s; position: relative; }
    .top-nav-item:hover { background: rgba(22, 119, 255, .08); color: var(--primary); }
    .top-nav-item.is-active { color: var(--primary); font-weight: 500; background: #e6f4ff; }
    .top-nav-item.is-active::after { content: ''; position: absolute; bottom: 0; left: 16px; right: 16px; height: 2px; background: var(--primary); border-radius: 1px; }
    .app-body { flex: 1; display: flex; min-height: 0; }
    .app-sider { width: 220px; background: var(--card); border-right: 1px solid var(--border); padding: 16px 0; flex-shrink: 0; }
    .app-sider.is-hidden { width: 0; min-width: 0; opacity: 0; overflow: hidden; padding: 0; border-right: none; }
    .side-nav-container { display: flex; flex-direction: column; gap: 2px; }
    .side-nav-item { padding: 10px 20px; text-decoration: none; color: var(--text2); font-size: 14px; border-radius: 6px; border-left: 3px solid transparent; transition: all .2s; }
    .side-nav-item:hover { color: var(--primary); background: rgba(22, 119, 255, .06); }
    .side-nav-item.is-active { color: var(--primary); background: #e6f4ff; font-weight: 500; border-left-color: var(--primary); }
    .app-content { flex: 1; padding: 24px; overflow: auto; }
    .create-page { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 32px; }
    .create-title { font-size: 20px; font-weight: 600; margin-bottom: 24px; color: var(--text); }
    .form-section { margin-bottom: 28px; }
    .form-section-title { font-size: 15px; font-weight: 600; margin-bottom: 16px; color: var(--text); padding-bottom: 8px; border-bottom: 1px solid var(--border); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 16px; }
    .form-row.full { grid-template-columns: 1fr; }
    .form-item { margin-bottom: 16px; }
    .form-label { display: block; margin-bottom: 8px; font-size: 14px; color: var(--text); }
    .form-label .required { color: #ff4d4f; }
    .form-input, .form-select, .form-textarea { width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; }
    .form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--primary); }
    .form-textarea { min-height: 80px; resize: vertical; }
    .form-actions { margin-top: 28px; padding-top: 24px; border-top: 1px solid var(--border); display: flex; gap: 12px; }
    .btn { height: 36px; padding: 0 20px; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; transition: background .2s; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: #4096ff; }
    .btn-default { background: var(--card); border: 1px solid var(--border); color: var(--text); }
    .btn-default:hover { background: #fafafa; border-color: var(--primary); color: var(--primary); }
    .list-toolbar { margin-bottom: 12px; }
    .list-table-wrap { border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
    .list-table { width: 100%; border-collapse: collapse; font-size: 14px; }
    .list-table th, .list-table td { padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--border); }
    .list-table th { background: #fafafa; color: var(--text2); font-weight: 500; }
    .list-table td { color: var(--text); }
    .list-table .col-ops { white-space: nowrap; }
    .list-table .col-ops .btn { padding: 0 8px; margin-right: 8px; }
    .btn-text { background: transparent; color: var(--primary); }
    .btn-text:hover { background: rgba(22, 119, 255, .08); }
    .btn-danger { background: transparent; color: #ff4d4f; }
    .btn-danger:hover { background: rgba(255, 77, 79, .08); }
    .scope-checkbox-group { display: flex; flex-wrap: wrap; gap: 12px 24px; }
    .scope-checkbox-item { display: flex; align-items: center; gap: 6px; font-size: 14px; cursor: pointer; }
    .scope-checkbox-item input { cursor: pointer; }
    .modal-mask { position: fixed; inset: 0; background: rgba(0,0,0,.45); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .modal-mask.is-hidden { display: none; }
    .modal { background: var(--card); border-radius: var(--radius); box-shadow: 0 12px 48px rgba(0,0,0,.15); width: 600px; max-width: 90vw; max-height: 80vh; overflow: hidden; display: flex; flex-direction: column; }
    .modal-header { padding: 16px 24px; border-bottom: 1px solid var(--border); font-size: 16px; font-weight: 600; }
    .modal-body { padding: 24px; overflow: auto; flex: 1; }
    .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }
    .modal-table { width: 100%; border-collapse: collapse; font-size: 14px; }
    .modal-table th, .modal-table td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); }
    .modal-table th { background: #fafafa; }
    .modal-table .col-check { width: 40px; text-align: center; }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="app-logo">平台管理系统</div>
      <nav class="top-nav-container"></nav>
    </header>
    <div class="app-body">
      <aside class="app-sider is-hidden" data-sider="base-control">
        <nav class="side-nav-container"></nav>
      </aside>
      <main id="app-main" class="app-content">
        <div class="create-page">
          <h1 class="create-title">编辑工作空间</h1>
          <form id="workspaceEditForm">
            <div class="form-section">
              <div class="form-section-title">基础信息</div>
              <div class="form-row">
                <div class="form-item">
                  <label class="form-label">工作空间名称 <span class="required">*</span></label>
                  <input type="text" class="form-input" id="wsName" name="wsName" placeholder="请输入工作空间名称" required>
                </div>
              </div>
              <div class="form-row full">
                <div class="form-item">
                  <label class="form-label">工作空间描述</label>
                  <textarea class="form-textarea" id="wsDesc" name="wsDesc" placeholder="请输入工作空间描述"></textarea>
                </div>
              </div>
            </div>
            <div class="form-section">
              <div class="form-section-title">绑定开发平台</div>
              <div class="form-item">
                <label class="form-label">选择需要绑定的开发平台（可多选）</label>
                <div class="scope-checkbox-group" id="platformCheckGroup"></div>
              </div>
            </div>
            <div class="form-section">
              <div class="form-section-title">资源配置 - 绑定资源池</div>
              <div class="list-toolbar">
                <button type="button" class="btn btn-primary" id="btnAddPool">新增资源池</button>
              </div>
              <div class="list-table-wrap">
                <table class="list-table" id="poolTable">
                  <thead>
                    <tr>
                      <th>资源池名称</th>
                      <th>CPU（剩余/总）</th>
                      <th>内存（剩余/总）</th>
                      <th>GPU（剩余/总）</th>
                      <th>可用范围</th>
                      <th class="col-ops">操作</th>
                    </tr>
                  </thead>
                  <tbody id="poolTableBody"></tbody>
                </table>
              </div>
            </div>
            <div class="form-section">
              <div class="form-section-title">资源配置 - 绑定存储卷</div>
              <div class="list-toolbar">
                <button type="button" class="btn btn-primary" id="btnAddStorage">绑定存储卷</button>
              </div>
              <div class="list-table-wrap">
                <table class="list-table" id="storageTable">
                  <thead>
                    <tr>
                      <th>存储卷名称</th>
                      <th>剩余/总（GiB）</th>
                      <th class="col-ops">操作</th>
                    </tr>
                  </thead>
                  <tbody id="storageTableBody"></tbody>
                </table>
              </div>
            </div>
            <div class="form-section">
              <div class="form-section-title">用户配置</div>
              <div class="list-toolbar">
                <button type="button" class="btn btn-primary" id="btnAddUser">新增用户</button>
              </div>
              <div class="list-table-wrap">
                <table class="list-table" id="userTable">
                  <thead>
                    <tr>
                      <th>账号</th>
                      <th>姓名</th>
                      <th>所属组织</th>
                      <th>角色</th>
                      <th>描述</th>
                      <th class="col-ops">操作</th>
                    </tr>
                  </thead>
                  <tbody id="userTableBody"></tbody>
                </table>
              </div>
            </div>
            <div class="form-section">
              <div class="form-section-title">用户组配置</div>
              <div class="list-toolbar">
                <button type="button" class="btn btn-primary" id="btnAddGroup">新增用户组</button>
              </div>
              <div class="list-table-wrap">
                <table class="list-table" id="groupTable">
                  <thead>
                    <tr>
                      <th>用户组名称</th>
                      <th>角色</th>
                      <th>描述</th>
                      <th class="col-ops">操作</th>
                    </tr>
                  </thead>
                  <tbody id="groupTableBody"></tbody>
                </table>
              </div>
            </div>
            <div class="form-actions">
              <button type="submit" class="btn btn-primary">保存</button>
              <a href="workbench.html" class="btn btn-default">取消</a>
            </div>
          </form>
        </div>
      </main>
    </div>
  </div>
  <div class="modal-mask is-hidden" id="addUserModal">
    <div class="modal">
      <div class="modal-header">新增用户</div>
      <div class="modal-body">
        <div class="modal-table-wrap" style="max-height:320px;overflow:auto;">
          <table class="modal-table">
            <thead>
              <tr>
                <th class="col-check"><input type="checkbox" id="addUserCheckAll" title="全选"></th>
                <th>账号</th>
                <th>姓名</th>
                <th>所属组织</th>
                <th>角色</th>
                <th>描述</th>
              </tr>
            </thead>
            <tbody id="addUserModalBody"></tbody>
          </table>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-default" id="addUserModalCancel">取消</button>
        <button type="button" class="btn btn-primary" id="addUserModalConfirm">确定</button>
      </div>
    </div>
  </div>
  <div class="modal-mask is-hidden" id="poolModal">
    <div class="modal">
      <div class="modal-header">选择资源池</div>
      <div class="modal-body">
        <div class="modal-table-wrap" style="max-height:320px;overflow:auto;">
          <table class="modal-table">
            <thead>
              <tr>
                <th class="col-check"><input type="checkbox" id="poolModalCheckAll" title="全选"></th>
                <th>资源池名称</th>
                <th>CPU（剩余/总）</th>
                <th>内存（剩余/总）</th>
                <th>GPU（剩余/总）</th>
                <th>可用范围</th>
              </tr>
            </thead>
            <tbody id="poolModalBody"></tbody>
          </table>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-default" id="poolModalCancel">取消</button>
        <button type="button" class="btn btn-primary" id="poolModalConfirm">确定</button>
      </div>
    </div>
  </div>
  <div class="modal-mask is-hidden" id="storageModal">
    <div class="modal">
      <div class="modal-header">选择存储卷</div>
      <div class="modal-body">
        <div class="modal-table-wrap" style="max-height:320px;overflow:auto;">
          <table class="modal-table">
            <thead>
              <tr>
                <th class="col-check"><input type="checkbox" id="storageModalCheckAll" title="全选"></th>
                <th>存储卷名称</th>
                <th>剩余/总（GiB）</th>
              </tr>
            </thead>
            <tbody id="storageModalBody"></tbody>
          </table>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-default" id="storageModalCancel">取消</button>
        <button type="button" class="btn btn-primary" id="storageModalConfirm">确定</button>
      </div>
    </div>
  </div>
  <div class="modal-mask is-hidden" id="addRoleModal">
    <div class="modal">
      <div class="modal-header" id="addRoleModalTitle">添加角色</div>
      <div class="modal-body">
        <div class="form-item">
          <label class="form-label">选择开发角色</label>
          <div class="scope-checkbox-group" id="addRoleCheckboxGroup"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-default" id="addRoleModalCancel">取消</button>
        <button type="button" class="btn btn-primary" id="addRoleModalConfirm">确定</button>
      </div>
    </div>
  </div>
  <div class="modal-mask is-hidden" id="addGroupModal">
    <div class="modal">
      <div class="modal-header">新增用户组</div>
      <div class="modal-body">
        <div class="modal-table-wrap" style="max-height:320px;overflow:auto;">
          <table class="modal-table">
            <thead>
              <tr>
                <th class="col-check"><input type="checkbox" id="addGroupCheckAll" title="全选"></th>
                <th>用户组名称</th>
                <th>角色</th>
                <th>描述</th>
              </tr>
            </thead>
            <tbody id="addGroupModalBody"></tbody>
          </table>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-default" id="addGroupModalCancel">取消</button>
        <button type="button" class="btn btn-primary" id="addGroupModalConfirm">确定</button>
      </div>
    </div>
  </div>
  <script src="./common.js"></script>
  <script>
    initLayout();

    (function () {
      var params = new URLSearchParams(location.search);
      var editId = params.get('id');
      if (!editId) {
        window.location.href = 'workbench.html';
        return;
      }

      var SCOPE_OPTIONS = [
        { name: '模型开发', value: 'model-dev' },
        { name: '模型管理', value: 'model-mgmt' },
        { name: '服务管理', value: 'service-mgmt' },
        { name: '镜像管理', value: 'image-mgmt' }
      ];

      var PLATFORM_OPTIONS = [
        { id: 'app-dev', name: '应用开发平台' },
        { id: 'data-govern', name: '多模态数据治理平台' },
        { id: 'model-dev', name: '模型开发平台' },
        { id: 'vision', name: '多模态视觉平台' }
      ];

      var resourcePoolListRaw = JSON.parse(localStorage.getItem('resourcePoolList') || 'null');
      var machinePoolList = JSON.parse(localStorage.getItem('machinePoolList') || '[]');
      function normalizeResourcePool(p) {
        if (!p) return p;
        if (p.bindings && Array.isArray(p.bindings) && p.bindings.length > 0) {
          var cpuTotal = 0, memTotal = 0, gpuTotal = 0, gpuModel = '', scopes = [];
          p.bindings.forEach(function (b) {
            cpuTotal += b.cpu || 0;
            memTotal += b.mem || 0;
            gpuTotal += b.gpu || 0;
            if (!gpuModel && b.gpu) {
              var mp = machinePoolList.find(function (x) { return x.id === b.machinePoolId; });
              if (mp) gpuModel = mp.gpuModel || '';
            }
            (b.scopes || []).forEach(function (s) { if (scopes.indexOf(s) === -1) scopes.push(s); });
          });
          return { id: p.id, name: p.name, cpuUsed: 0, cpuTotal: cpuTotal, memUsed: 0, memTotal: memTotal, gpuUsed: 0, gpuTotal: gpuTotal, gpuModel: gpuModel, scopes: scopes };
        }
        return p;
      }
      var resourcePools = (resourcePoolListRaw || []).map(normalizeResourcePool).filter(Boolean);

      var storageVolumes = JSON.parse(localStorage.getItem('storageVolumeList') || 'null') || [];

      var orgIdToName = {};
      (function () {
        var orgData = [
          { id: 'org-1', name: '总公司', children: [
            { id: 'org-2', name: '技术研发部', children: [] },
            { id: 'org-3', name: '市场部', children: [] },
            { id: 'org-4', name: '前端组', children: [] }
          ]}
        ];
        function build(nodes) {
          nodes.forEach(function (n) {
            orgIdToName[n.id] = n.name;
            if (n.children && n.children.length) build(n.children);
          });
        }
        build(orgData);
      })();

      var userList = JSON.parse(localStorage.getItem('userList') || '[]');
      var roleList = JSON.parse(localStorage.getItem('roleList') || 'null') || [
        { id: 'r1', name: '租户管理员', level: '平台角色' }, { id: 'r2', name: '组织管理员', level: '平台角色' },
        { id: 'r4', name: '空间管理员', level: '开发角色' }, { id: 'r5', name: '空间成员', level: '开发角色' }, { id: 'r7', name: '开发工程师', level: '开发角色' }
      ];
      var spaceRoles = roleList.filter(function (r) { return r.level === '开发角色'; });
      var groupList = JSON.parse(localStorage.getItem('userGroupList') || '[]');

      function getRoleNames(roleIds) {
        if (!roleIds || roleIds.length === 0) return '-';
        return roleIds.map(function (rid) {
          var r = roleList.find(function (x) { return x.id === rid; });
          return r ? r.name : rid;
        }).join('、');
      }
      function getSpaceRoleNames(roleIds) {
        if (!roleIds || roleIds.length === 0) return '';
        return roleIds.map(function (rid) {
          var r = roleList.find(function (x) { return x.id === rid; });
          return r && r.level === '开发角色' ? r.name : null;
        }).filter(Boolean).join('、');
      }

      function getVolumeTotal(v) {
        var t = 0;
        (v.bindings || []).forEach(function (b) { t += b.capacity || 0; });
        return t;
      }

      var wsUsers = [];
      var wsGroups = [];
      var wsPools = [];
      var wsStorages = [];

      var workspaceList = JSON.parse(localStorage.getItem('workspaceList') || '[]');
      var currentWs = workspaceList.find(function (x) { return x.id === editId; });
      if (!currentWs) {
        alert('工作空间不存在');
        window.location.href = 'workbench.html';
        return;
      }

      function loadWorkspaceData() {
        document.getElementById('wsName').value = currentWs.name || '';
        document.getElementById('wsDesc').value = currentWs.desc || '';
        var container = document.getElementById('platformCheckGroup');
        container.innerHTML = PLATFORM_OPTIONS.map(function (o) {
          var checked = (currentWs.platformIds || []).indexOf(o.id) !== -1 ? ' checked' : '';
          return '<label class="scope-checkbox-item"><input type="checkbox" class="platform-check" value="' + o.id + '"' + checked + '>' + o.name + '</label>';
        }).join('');
        wsPools = (currentWs.poolIds || []).map(function (pid) {
          var pool = resourcePools.find(function (p) { return p.id === pid; });
          return pool ? { pool: pool } : null;
        }).filter(Boolean);
        wsStorages = (currentWs.volumeIds || []).map(function (vid) {
          var vol = storageVolumes.find(function (v) { return v.id === vid; });
          return vol ? { volume: vol } : null;
        }).filter(Boolean);
        wsUsers = (currentWs.userIds || []).map(function (uid) {
          var u = userList.find(function (x) { return x.id === uid; });
          if (!u) return null;
          var copy = JSON.parse(JSON.stringify(u));
          copy.wsRoles = (currentWs.userRoles || {})[uid] || [];
          return copy;
        }).filter(Boolean);
        wsGroups = (currentWs.groupIds || []).map(function (gid) {
          var g = groupList.find(function (x) { return x.id === gid; });
          if (!g) return null;
          var copy = JSON.parse(JSON.stringify(g));
          copy.wsRoles = (currentWs.groupRoles || {})[gid] || [];
          return copy;
        }).filter(Boolean);
      }

      function renderUserTable() {
        var tbody = document.getElementById('userTableBody');
        tbody.innerHTML = wsUsers.map(function (u) {
          var roleDisplay = getRoleNames(u.wsRoles) || '-';
          return '<tr data-id="' + u.id + '">' +
            '<td>' + (u.account || '-') + '</td>' +
            '<td>' + (u.name || '-') + '</td>' +
            '<td>' + (orgIdToName[u.orgId] || '-') + '</td>' +
            '<td>' + roleDisplay + '</td>' +
            '<td>' + (u.desc || '-') + '</td>' +
            '<td class="col-ops">' +
            '<button type="button" class="btn btn-text btn-user-add-role" data-id="' + u.id + '">添加角色</button>' +
            '<button type="button" class="btn btn-danger btn-user-delete" data-id="' + u.id + '">删除</button>' +
            '</td></tr>';
        }).join('');
        tbody.querySelectorAll('.btn-user-add-role').forEach(function (btn) {
          btn.addEventListener('click', function () { openAddRoleModal('user', btn.dataset.id); });
        });
        tbody.querySelectorAll('.btn-user-delete').forEach(function (btn) {
          btn.addEventListener('click', function () {
            wsUsers = wsUsers.filter(function (x) { return x.id !== btn.dataset.id; });
            renderUserTable();
          });
        });
      }

      function renderGroupTable() {
        var tbody = document.getElementById('groupTableBody');
        tbody.innerHTML = wsGroups.map(function (g) {
          var parts = [getSpaceRoleNames(g.roleIds || []), getRoleNames(g.wsRoles)].filter(Boolean);
          var roleNames = parts.join('、') || '-';
          return '<tr data-id="' + g.id + '">' +
            '<td>' + (g.name || '-') + '</td>' +
            '<td>' + roleNames + '</td>' +
            '<td>' + (g.desc || '-') + '</td>' +
            '<td class="col-ops">' +
            '<button type="button" class="btn btn-text btn-group-add-role" data-id="' + g.id + '">添加角色</button>' +
            '<button type="button" class="btn btn-danger btn-group-delete" data-id="' + g.id + '">删除</button>' +
            '</td></tr>';
        }).join('');
        tbody.querySelectorAll('.btn-group-add-role').forEach(function (btn) {
          btn.addEventListener('click', function () { openAddRoleModal('group', btn.dataset.id); });
        });
        tbody.querySelectorAll('.btn-group-delete').forEach(function (btn) {
          btn.addEventListener('click', function () {
            wsGroups = wsGroups.filter(function (x) { return x.id !== btn.dataset.id; });
            renderGroupTable();
          });
        });
      }

      function renderPoolTable() {
        var tbody = document.getElementById('poolTableBody');
        tbody.innerHTML = wsPools.map(function (item, idx) {
          var p = item.pool;
          var cpuStr = p.cpuTotal ? (p.cpuTotal - (p.cpuUsed || 0)) + '/' + p.cpuTotal + '核' : '-';
          var memStr = p.memTotal ? (p.memTotal - (p.memUsed || 0)) + '/' + p.memTotal + 'GiB' : '-';
          var gpuStr = p.gpuTotal ? (p.gpuTotal - (p.gpuUsed || 0)) + '/' + p.gpuTotal + '张' : '-';
          var scopeNames = (p.scopes || []).map(function (v) {
            var o = SCOPE_OPTIONS.find(function (x) { return x.value === v; });
            return o ? o.name : v;
          }).join('、') || '-';
          return '<tr data-idx="' + idx + '">' +
            '<td>' + (p.name || '-') + '</td>' +
            '<td>' + cpuStr + '</td>' +
            '<td>' + memStr + '</td>' +
            '<td>' + gpuStr + '</td>' +
            '<td>' + scopeNames + '</td>' +
            '<td class="col-ops">' +
            '<button type="button" class="btn btn-danger btn-pool-delete" data-idx="' + idx + '">删除</button>' +
            '</td></tr>';
        }).join('');
        tbody.querySelectorAll('.btn-pool-delete').forEach(function (btn) {
          btn.addEventListener('click', function () {
            wsPools.splice(parseInt(btn.dataset.idx, 10), 1);
            renderPoolTable();
          });
        });
      }

      function renderStorageTable() {
        var tbody = document.getElementById('storageTableBody');
        tbody.innerHTML = wsStorages.map(function (item, idx) {
          var v = item.volume;
          var total = getVolumeTotal(v);
          return '<tr data-idx="' + idx + '">' +
            '<td>' + (v.name || '-') + '</td>' +
            '<td>' + total + '/' + total + '</td>' +
            '<td class="col-ops">' +
            '<button type="button" class="btn btn-danger btn-storage-delete" data-idx="' + idx + '">删除</button>' +
            '</td></tr>';
        }).join('');
        tbody.querySelectorAll('.btn-storage-delete').forEach(function (btn) {
          btn.addEventListener('click', function () {
            wsStorages.splice(parseInt(btn.dataset.idx, 10), 1);
            renderStorageTable();
          });
        });
      }

      var addRoleTarget = { type: '', id: '' };
      function openAddRoleModal(type, id) {
        addRoleTarget = { type: type, id: id };
        document.getElementById('addRoleModalTitle').textContent = type === 'user' ? '为用户添加角色' : '为用户组添加角色';
        var container = document.getElementById('addRoleCheckboxGroup');
        var existingIds = [];
        if (type === 'user') {
          var u = wsUsers.find(function (x) { return x.id === id; });
          existingIds = (u && u.wsRoles) ? u.wsRoles : [];
        } else {
          var g = wsGroups.find(function (x) { return x.id === id; });
          existingIds = (g && g.wsRoles) ? g.wsRoles : [];
        }
        container.innerHTML = spaceRoles.map(function (r) {
          var checked = existingIds.indexOf(r.id) !== -1 ? ' checked' : '';
          return '<label class="scope-checkbox-item"><input type="checkbox" class="role-ws-check" value="' + r.id + '"' + checked + '>' + r.name + '</label>';
        }).join('');
        document.getElementById('addRoleModal').classList.remove('is-hidden');
      }

      document.getElementById('btnAddUser').addEventListener('click', function () {
        var existingIds = wsUsers.map(function (u) { return u.id; });
        var available = userList.filter(function (u) { return existingIds.indexOf(u.id) === -1; });
        var tbody = document.getElementById('addUserModalBody');
        tbody.innerHTML = available.map(function (u) {
          return '<tr><td class="col-check"><input type="checkbox" class="user-check" value="' + u.id + '"></td>' +
            '<td>' + (u.account || '-') + '</td>' +
            '<td>' + (u.name || '-') + '</td>' +
            '<td>' + (orgIdToName[u.orgId] || '-') + '</td>' +
            '<td>' + (u.role || '-') + '</td>' +
            '<td>' + (u.desc || '-') + '</td></tr>';
        }).join('');
        document.getElementById('addUserCheckAll').checked = false;
        document.getElementById('addUserCheckAll').onclick = function () {
          var c = this.checked;
          tbody.querySelectorAll('.user-check').forEach(function (cb) { cb.checked = c; });
        };
        document.getElementById('addUserModal').classList.remove('is-hidden');
      });

      document.getElementById('addUserModalCancel').addEventListener('click', function () { document.getElementById('addUserModal').classList.add('is-hidden'); });
      document.getElementById('addUserModalConfirm').addEventListener('click', function () {
        document.querySelectorAll('#addUserModalBody .user-check:checked').forEach(function (cb) {
          var u = userList.find(function (x) { return x.id === cb.value; });
          if (u) {
            var copy = JSON.parse(JSON.stringify(u));
            copy.wsRoles = [];
            wsUsers.push(copy);
          }
        });
        document.getElementById('addUserModal').classList.add('is-hidden');
        renderUserTable();
      });

      document.getElementById('btnAddGroup').addEventListener('click', function () {
        var existingIds = wsGroups.map(function (g) { return g.id; });
        var available = groupList.filter(function (g) { return existingIds.indexOf(g.id) === -1; });
        var tbody = document.getElementById('addGroupModalBody');
        tbody.innerHTML = available.map(function (g) {
          return '<tr><td class="col-check"><input type="checkbox" class="group-check" value="' + g.id + '"></td>' +
            '<td>' + (g.name || '-') + '</td>' +
            '<td>' + getRoleNames(g.roleIds) + '</td>' +
            '<td>' + (g.desc || '-') + '</td></tr>';
        }).join('');
        document.getElementById('addGroupCheckAll').checked = false;
        document.getElementById('addGroupCheckAll').onclick = function () {
          var c = this.checked;
          tbody.querySelectorAll('.group-check').forEach(function (cb) { cb.checked = c; });
        };
        document.getElementById('addGroupModal').classList.remove('is-hidden');
      });

      document.getElementById('addGroupModalCancel').addEventListener('click', function () { document.getElementById('addGroupModal').classList.add('is-hidden'); });
      document.getElementById('addGroupModalConfirm').addEventListener('click', function () {
        document.querySelectorAll('#addGroupModalBody .group-check:checked').forEach(function (cb) {
          var g = groupList.find(function (x) { return x.id === cb.value; });
          if (g) {
            g = JSON.parse(JSON.stringify(g));
            g.wsRoles = g.wsRoles || [];
            wsGroups.push(g);
          }
        });
        document.getElementById('addGroupModal').classList.add('is-hidden');
        renderGroupTable();
      });

      document.getElementById('addRoleModalCancel').addEventListener('click', function () { document.getElementById('addRoleModal').classList.add('is-hidden'); });
      document.getElementById('addRoleModalConfirm').addEventListener('click', function () {
        var checked = [];
        document.querySelectorAll('#addRoleCheckboxGroup .role-ws-check:checked').forEach(function (cb) { checked.push(cb.value); });
        if (addRoleTarget.type === 'user') {
          var u = wsUsers.find(function (x) { return x.id === addRoleTarget.id; });
          if (u) u.wsRoles = checked;
          renderUserTable();
        } else {
          var g = wsGroups.find(function (x) { return x.id === addRoleTarget.id; });
          if (g) g.wsRoles = checked;
          renderGroupTable();
        }
        document.getElementById('addRoleModal').classList.add('is-hidden');
      });

      function openPoolModal() {
        var boundIds = wsPools.map(function (item) { return item.pool.id; });
        var available = resourcePools.filter(function (p) { return boundIds.indexOf(p.id) === -1; });
        var tbody = document.getElementById('poolModalBody');
        tbody.innerHTML = available.map(function (p) {
          var cpuStr = p.cpuTotal ? (p.cpuTotal - (p.cpuUsed || 0)) + '/' + p.cpuTotal + '核' : '-';
          var memStr = p.memTotal ? (p.memTotal - (p.memUsed || 0)) + '/' + p.memTotal + 'GiB' : '-';
          var gpuStr = p.gpuTotal ? (p.gpuTotal - (p.gpuUsed || 0)) + '/' + p.gpuTotal + '张' : '-';
          var scopeNames = (p.scopes || []).map(function (v) {
            var o = SCOPE_OPTIONS.find(function (x) { return x.value === v; });
            return o ? o.name : v;
          }).join('、') || '-';
          return '<tr><td class="col-check"><input type="checkbox" class="pool-check" value="' + p.id + '"></td>' +
            '<td>' + (p.name || '-') + '</td>' +
            '<td>' + cpuStr + '</td>' +
            '<td>' + memStr + '</td>' +
            '<td>' + gpuStr + '</td>' +
            '<td>' + scopeNames + '</td></tr>';
        }).join('');
        document.getElementById('poolModalCheckAll').checked = false;
        document.getElementById('poolModalCheckAll').onclick = function () {
          var c = this.checked;
          tbody.querySelectorAll('.pool-check').forEach(function (cb) { cb.checked = c; });
        };
        document.getElementById('poolModal').classList.remove('is-hidden');
      }

      document.getElementById('poolModalCancel').addEventListener('click', function () { document.getElementById('poolModal').classList.add('is-hidden'); });
      document.getElementById('poolModalConfirm').addEventListener('click', function () {
        document.querySelectorAll('#poolModalBody .pool-check:checked').forEach(function (cb) {
          var pool = resourcePools.find(function (p) { return p.id === cb.value; });
          if (pool) wsPools.push({ pool: pool });
        });
        document.getElementById('poolModal').classList.add('is-hidden');
        renderPoolTable();
      });

      function openStorageModal() {
        var boundIds = wsStorages.map(function (item) { return item.volume.id; });
        var available = storageVolumes.filter(function (v) { return boundIds.indexOf(v.id) === -1; });
        var tbody = document.getElementById('storageModalBody');
        tbody.innerHTML = available.map(function (v) {
          var total = getVolumeTotal(v);
          return '<tr><td class="col-check"><input type="checkbox" class="storage-check" value="' + v.id + '"></td>' +
            '<td>' + (v.name || '-') + '</td>' +
            '<td>' + total + '/' + total + '</td></tr>';
        }).join('');
        document.getElementById('storageModalCheckAll').checked = false;
        document.getElementById('storageModalCheckAll').onclick = function () {
          var c = this.checked;
          tbody.querySelectorAll('.storage-check').forEach(function (cb) { cb.checked = c; });
        };
        document.getElementById('storageModal').classList.remove('is-hidden');
      }

      document.getElementById('storageModalCancel').addEventListener('click', function () { document.getElementById('storageModal').classList.add('is-hidden'); });
      document.getElementById('storageModalConfirm').addEventListener('click', function () {
        document.querySelectorAll('#storageModalBody .storage-check:checked').forEach(function (cb) {
          var vol = storageVolumes.find(function (v) { return v.id === cb.value; });
          if (vol) wsStorages.push({ volume: vol });
        });
        document.getElementById('storageModal').classList.add('is-hidden');
        renderStorageTable();
      });

      document.getElementById('btnAddPool').addEventListener('click', openPoolModal);
      document.getElementById('btnAddStorage').addEventListener('click', openStorageModal);

      document.getElementById('workspaceEditForm').addEventListener('submit', function (e) {
        e.preventDefault();
        var name = document.getElementById('wsName').value.trim();
        var desc = document.getElementById('wsDesc').value.trim();
        if (!name) { alert('请输入工作空间名称'); return; }

        var userRoles = {};
        wsUsers.forEach(function (u) { userRoles[u.id] = u.wsRoles || []; });
        var groupRoles = {};
        wsGroups.forEach(function (g) { groupRoles[g.id] = g.wsRoles || []; });

        var platformIds = [];
        document.querySelectorAll('#platformCheckGroup .platform-check:checked').forEach(function (cb) { platformIds.push(cb.value); });
        currentWs.name = name;
        currentWs.desc = desc;
        currentWs.platformIds = platformIds;
        currentWs.poolIds = wsPools.map(function (p) { return p.pool.id; });
        currentWs.volumeIds = wsStorages.map(function (s) { return s.volume.id; });
        currentWs.userIds = wsUsers.map(function (u) { return u.id; });
        currentWs.groupIds = wsGroups.map(function (g) { return g.id; });
        currentWs.userRoles = userRoles;
        currentWs.groupRoles = groupRoles;

        localStorage.setItem('workspaceList', JSON.stringify(workspaceList));
        alert('保存成功');
        window.location.href = 'workbench.html';
      });

      loadWorkspaceData();
      renderUserTable();
      renderGroupTable();
      renderPoolTable();
      renderStorageTable();
    })();
  </script>
</body>
</html>
